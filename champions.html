<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Champions — Simple Motor Racing</title>
  <style>
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-display:swap; font-weight:normal; }
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-display:swap; font-weight:bold; }
    :root {
      --bg:#0d1117; --bg-deep:#080c12; --bg-mid:#0a0f18; --border:#1e2f44;
      --hi:#ffffff; --mid:#8ab4d4; --lo:#4a6a88; --dim:#2a4055; --accent:#cc2233;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--mid); font-family:'Square','Courier New',monospace; font-size:12px; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

    #topbar { width:100%; height:44px; background:var(--bg-deep); border:1px solid var(--border); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 16px; }
    .b-flat { font-size:15px; color:var(--hi); letter-spacing:0.04em; flex-shrink:0; }
    .b-flat em { font-style:normal; color:var(--mid); }
    .topbar-nav { display:flex; gap:16px; margin-left:auto; margin-right:16px; }
    .topbar-nav-link { color:var(--lo); text-decoration:none; font-size:10px; letter-spacing:0.08em; }
    .topbar-nav-link:hover { color:var(--mid); }
    .topbar-nav-link.current { color:var(--mid); }

    #info-bar { width:100%; background:var(--bg-mid); border-bottom:1px solid var(--border); padding:6px 16px; font-size:9px; letter-spacing:2px; color:var(--lo); text-transform:uppercase; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    #loading-state { padding:48px 16px; font-size:9px; letter-spacing:3px; color:var(--lo); text-align:center; width:100%; animation:pulse 1.6s ease-in-out infinite; }

    #page { width:100%; max-width:960px; padding:16px 16px 24px; }

    #champ-table { width:100%; border-collapse:collapse; border:1px solid var(--border); }
    #champ-table th { font-size:9px; letter-spacing:1px; color:var(--lo); text-align:left; padding:5px 12px; border-bottom:1px solid var(--border); background:var(--bg-deep); white-space:nowrap; }
    #champ-table td { padding:5px 10px; font-size:11px; color:var(--mid); border-bottom:1px solid var(--dim); vertical-align:middle; }
    #champ-table tr:last-child td { border-bottom:none; }
    #champ-table tr:hover td { background:var(--bg-mid); }
    #champ-table a { color:inherit; text-decoration:none; }
    #champ-table a:hover { color:var(--hi); }

    .col-year { color:var(--hi); font-size:12px; white-space:nowrap; width:52px; }
    .col-driver { color:var(--hi); white-space:nowrap; }
    .col-team { color:var(--lo); font-size:10px; white-space:nowrap; }
    .col-pts { text-align:right; color:var(--hi); width:40px; }
    .col-sep { width:1px; background:var(--border); padding:0 !important; }
    .team-dot { display:inline-block; width:3px; height:12px; vertical-align:middle; margin-right:6px; border-radius:1px; flex-shrink:0; }
    .star { color:#d4a800; margin-right:4px; }

    .section-head { font-size:8px; letter-spacing:2px; color:var(--lo); padding:5px 12px; background:var(--bg-deep); border-bottom:1px solid var(--border); text-transform:uppercase; }
  </style>
</head>
<body>

  <div id="topbar">
    <span class="b-flat">Simple <em>Motor Racing</em></span>
    <nav class="topbar-nav">
      <a href="index.html" class="topbar-nav-link">HOME</a>
      <a href="calendar.html" class="topbar-nav-link">CALENDAR</a>
      <a href="drivers.html" class="topbar-nav-link">DRIVERS</a>
      <a href="team.html" class="topbar-nav-link">TEAMS</a>
      <a href="standings.html" class="topbar-nav-link">STANDINGS</a>
      <a href="champions.html" class="topbar-nav-link current">CHAMPIONS</a>
    </nav>
  </div>
  <div id="info-bar">Roll of Honour</div>

  <div id="loading-state">COMPUTING HISTORY…</div>

  <div id="page" style="display:none">
    <table id="champ-table">
      <thead>
        <tr>
          <th class="col-year">YEAR</th>
          <th>DRIVERS CHAMPION</th>
          <th>TEAM</th>
          <th class="col-pts">PTS</th>
          <th class="col-sep"></th>
          <th>CONSTRUCTORS CHAMPION</th>
          <th class="col-pts">PTS</th>
        </tr>
      </thead>
      <tbody id="champ-tbody"></tbody>
    </table>
  </div>

  <script type="module">
    import { TEAMS, ENGINES } from './data.js';
    import { DRIVER_POOL } from './drivers.js';
    import { getDisplayYear, getTeamEngine, getSeasonSnapshot } from './worldstate.js';
    import {
      getCurrentEvent, getWorldSeed, ensurePastResultsCached,
      loadSeasonSummary,
    } from './championship.js';
    import { initRace, cars }  from './state.js';
    import {
      runRace, initStrategies, initWeather, setCurrentCircuit, runQualifyingSession, setFastMode,
    } from './simulation.js';

    const NAT_CODE = {
      'american':'us',   'argentinian':'ar', 'australian':'au', 'austrian':'at',
      'belgian':'be',    'brazilian':'br',   'british':'gb',    'canadian':'ca',
      'chinese':'cn',    'colombian':'co',   'czech':'cz',      'danish':'dk',
      'dutch':'nl',      'egyptian':'eg',    'finnish':'fi',    'french':'fr',
      'german':'de',     'ghanaian':'gh',    'greek':'gr',      'hungarian':'hu',
      'indian':'in',     'irish':'ie',       'italian':'it',    'japanese':'jp',
      'mexican':'mx',    'moroccan':'ma',    'new zealander':'nz','nigerian':'ng',
      'norwegian':'no',  'polish':'pl',      'portuguese':'pt', 'senegalese':'sn',
      'south african':'za','spanish':'es',   'swedish':'se',    'swiss':'ch',
    };

    const worldSeed    = getWorldSeed();
    const currentEvent = getCurrentEvent();
    const currentSeason = currentEvent.season;

    const simFns = {
      initRace, cars, runRace, initStrategies, initWeather,
      setCurrentCircuit, runQualifyingSession, getSeasonSnapshot, setFastMode,
    };

    function teamLabel(teamId, season) {
      const team = TEAMS.find(t => t.id === teamId);
      if (!team) return (teamId || '').toUpperCase();
      const engineId   = getTeamEngine(teamId, season, worldSeed);
      const engineName = (ENGINES[engineId]?.name ?? '').toUpperCase();
      const shortUp    = team.shortName.toUpperCase();
      return (!engineName || shortUp === engineName) ? shortUp : `${shortUp}-${engineName}`;
    }

    (async () => {
      await new Promise(r => setTimeout(r, 0));
      for (let s = 1; s < currentSeason; s++) {
        await ensurePastResultsCached(s, simFns);
      }

      const tbody = document.getElementById('champ-tbody');
      let anyRow = false;

      for (let s = currentSeason - 1; s >= 1; s--) {
        const summary = loadSeasonSummary(s);
        if (!summary) continue;

        const year = getDisplayYear(s);
        const ch   = summary.champion;
        const cc   = summary.constructorChampion;

        // Driver champion cells
        let driverCell = '—';
        let driverTeamCell = '—';
        let driverPts = '—';
        if (ch) {
          const driverName = ch.driverName.toUpperCase();
          const driverLink = ch.driverId != null
            ? `<a href="driver.html?id=${ch.driverId}&season=${s}">${driverName}</a>`
            : driverName;
          const pd        = DRIVER_POOL.find(d => d.id === ch.driverId);
          const natKey    = (pd?.nationality ?? '').toLowerCase();
          const flagCode  = NAT_CODE[natKey] ?? '';
          const flagHtml  = flagCode
            ? `<img src="https://flagcdn.com/w40/${flagCode}.png" style="height:11px;vertical-align:middle;margin-left:6px;border-radius:1px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.15)">`
            : '';
          driverCell = `<span class="star">★</span>${driverLink}${flagHtml}`;

          const team      = TEAMS.find(t => t.id === ch.teamId);
          const dot       = team ? `<span class="team-dot" style="background:${team.colour}"></span>` : '';
          const label     = teamLabel(ch.teamId, s);
          driverTeamCell  = team
            ? `${dot}<a href="team.html?id=${team.id}&season=${s}">${label}</a>`
            : label;
          driverPts = ch.points;
        }

        // Constructor champion cells
        let ctorCell = '—';
        let ctorPts  = '—';
        if (cc) {
          const team  = TEAMS.find(t => t.id === cc.teamId);
          const dot   = team ? `<span class="team-dot" style="background:${team.colour}"></span>` : '';
          const label = teamLabel(cc.teamId, s);
          ctorCell    = team
            ? `${dot}<a href="team.html?id=${team.id}&season=${s}">${label}</a>`
            : label;
          ctorPts = cc.points;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="col-year">${year}</td>
          <td class="col-driver">${driverCell}</td>
          <td class="col-team">${driverTeamCell}</td>
          <td class="col-pts">${driverPts}</td>
          <td class="col-sep"></td>
          <td class="col-team">${ctorCell}</td>
          <td class="col-pts">${ctorPts}</td>
        `;
        tbody.appendChild(tr);
        anyRow = true;
      }

      if (!anyRow) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;font-size:9px;letter-spacing:2px;color:var(--dim)">NO COMPLETED SEASONS YET</td></tr>';
      }

      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('page').style.display = '';
    })();
  </script>
</body>
</html>
