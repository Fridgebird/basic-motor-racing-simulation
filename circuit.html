<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit — Simple Motor Racing</title>
  <style>
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-weight:normal; }
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-weight:bold; }
    @font-face { font-family:'IBMPlex'; src:url('IBMPlexSans-VariableFont_wdth,wght.ttf') format('truetype'); font-weight:100 900; }
    @font-face { font-family:'TechRounded'; src:url('TechnicalRoundedVP-ThinOblique.otf') format('opentype'); font-weight:normal; }

    :root {
      --bg:#0d1117; --bg-deep:#080c12; --bg-mid:#0a0f18; --border:#1e2f44;
      --hi:#ffffff; --mid:#8ab4d4; --lo:#4a6a88; --dim:#2a4055; --accent:#cc2233;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      background:var(--bg);
      color:var(--mid);
      font-family:'Square','Courier New',monospace;
      font-size:12px;
      min-height:100vh;
    }

    #topbar {
      display:flex; align-items:center; padding:0 16px; height:44px;
      background:var(--bg-deep); border:1px solid var(--border);
      border-bottom:2px solid var(--accent);
    }
    .b-flat { font-size:15px; color:var(--hi); letter-spacing:0.04em; flex-shrink:0; }
    .b-flat em { font-style:normal; color:var(--mid); }
    .topbar-nav { display:flex; gap:16px; margin-left:auto; margin-right:16px; }
    .topbar-nav-link { color:var(--lo); text-decoration:none; font-size:10px; letter-spacing:0.08em; }
    .topbar-nav-link:hover { color:var(--mid); }
    .topbar-nav-link.current { color:var(--mid); }

    #info-bar {
      padding:6px 16px; background:var(--bg-deep); border-bottom:1px solid var(--border);
      font-size:11px; color:var(--lo); letter-spacing:0.06em;
    }

    #main { padding:20px 16px; max-width:760px; }

    /* ── Event hero ─────────────────────────────────────────────── */
    .event-hero { margin-bottom:28px; }

    .event-name-row {
      display:flex; align-items:center; gap:14px; margin-bottom:6px;
    }
    .event-flag {
      width:72px; height:36px; object-fit:cover; flex-shrink:0;
      border:1px solid var(--border);
      border-radius:2px; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .event-name {
      font-size:20px; color:var(--hi); letter-spacing:2px;
      text-transform:uppercase; line-height:1.2;
    }
    .circuit-name {
      font-size:13px; color:var(--mid); letter-spacing:1px;
      text-transform:uppercase; margin-bottom:4px; padding-left:2px;
    }
    .circuit-location {
      font-size:11px; color:var(--lo); letter-spacing:1px; padding-left:2px;
      margin-bottom:8px;
    }
    .circuit-meta {
      font-size:9px; color:var(--lo); letter-spacing:1.5px;
      text-transform:uppercase; padding-left:2px; margin-bottom:12px;
    }
    .circuit-profile {
      font-family:'TechRounded','IBMPlex','Segoe UI',system-ui,sans-serif;
      font-size:13px; color:var(--mid); line-height:1.75;
      max-width:600px; padding-left:2px;
    }
    .track-image {
      display:block; width:100%; max-width:600px; height:auto;
      margin:18px 0 4px; border:1px solid var(--border);
    }

    /* ── Round nav ──────────────────────────────────────────────── */
    #round-nav {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:20px;
    }
    .nav-btn {
      font-family:inherit; font-size:9px; letter-spacing:1px; color:var(--lo);
      background:none; border:1px solid var(--border); padding:5px 12px;
      cursor:pointer; text-transform:uppercase; text-decoration:none;
      display:inline-block;
    }
    .nav-btn:hover { color:var(--hi); border-color:var(--mid); }
    .nav-btn.disabled { opacity:0.25; cursor:default; pointer-events:none; }
    #round-label { font-size:11px; letter-spacing:2px; color:var(--hi); }

    /* ── Info sections ────────────────────────────────────────────── */
    .info-section { margin-bottom:20px; }
    .section-title {
      font-size:9px; color:var(--lo); letter-spacing:0.12em;
      text-transform:uppercase; border-bottom:1px solid var(--border);
      padding-bottom:4px; margin-bottom:10px;
    }

    .stat-grid { display:grid; grid-template-columns:180px 1fr; gap:6px 0; }
    .stat-label { font-size:10px; color:var(--lo); letter-spacing:0.06em; padding:3px 0; }
    .stat-value { font-size:11px; color:var(--hi); padding:3px 0; }
    .stat-value.muted { color:var(--mid); }

    .sector-table { width:100%; border-collapse:collapse; font-size:11px; }
    .sector-table th {
      text-align:left; color:var(--lo); font-size:9px; letter-spacing:0.10em;
      padding:3px 8px; border-bottom:1px solid var(--border); font-weight:normal;
    }
    .sector-table td { padding:5px 8px; border-bottom:1px solid var(--dim); }
    .sector-table td:first-child { color:var(--lo); width:36px; }
    .sector-table td.sec-label { color:var(--hi); }
    .sector-table td.sec-char  { color:var(--lo); font-size:10px; }

    .char-power    { color:#e87040; }
    .char-aero     { color:#40a0e8; }
    .char-balanced { color:var(--mid); }

    .footer-nav {
      display:flex; gap:12px; align-items:center;
      padding:8px 0 12px; border-top:1px solid var(--border); margin-top:8px;
    }
    .footer-btn {
      background:var(--bg-deep); border:1px solid var(--border); color:var(--lo);
      font-family:inherit; font-size:9px; letter-spacing:0.08em;
      padding:4px 12px; cursor:pointer; text-decoration:none; display:inline-block;
    }
    .footer-btn:hover { color:var(--mid); border-color:var(--mid); }
    .footer-btn.primary { color:var(--mid); border-color:var(--lo); }
    .footer-btn.primary:hover { color:var(--hi); border-color:var(--mid); }
    .footer-btn.locked { opacity:0.28; cursor:default; pointer-events:none; }
  </style>
</head>
<body>

  <div id="topbar">
    <div class="b-flat">Simple <em>Motor Racing</em></div>
    <nav class="topbar-nav">
      <a href="index.html" class="topbar-nav-link">CALENDAR</a>
      <a href="drivers.html" class="topbar-nav-link">DRIVERS</a>
      <a href="team.html" class="topbar-nav-link">TEAMS</a>
      <a href="standings.html" class="topbar-nav-link">STANDINGS</a>
    </nav>
  </div>

  <div id="info-bar">Circuit Guide</div>

  <div id="main">
    <div id="round-nav" style="display:none">
      <a class="nav-btn" id="btn-prev">◀ PREV RACE</a>
      <span id="round-label">–</span>
      <a class="nav-btn" id="btn-next">NEXT RACE ▶</a>
    </div>
    <div class="event-hero">
      <div class="event-name-row">
        <img class="event-flag" id="event-flag" src="" alt="" style="display:none">
        <div class="event-name" id="event-name">–</div>
      </div>
      <div class="circuit-name"   id="circuit-name">–</div>
      <div class="circuit-location" id="circuit-location">–</div>
      <div class="circuit-meta"   id="circuit-meta">–</div>
      <div class="circuit-profile" id="circuit-profile"></div>
      <img class="track-image" id="track-image" src="" alt="" style="display:none">
    </div>

    <div class="info-section">
      <div class="section-title">Circuit</div>
      <div class="stat-grid" id="circuit-stats"></div>
    </div>

    <div class="info-section">
      <div class="section-title">Sector Characteristics</div>
      <table class="sector-table" id="sector-table">
        <thead><tr><th>#</th><th>SECTOR</th><th>CHARACTER</th></tr></thead>
        <tbody id="sector-tbody"></tbody>
      </table>
    </div>

    <div class="info-section">
      <div class="section-title">Strategy Notes</div>
      <div class="stat-grid" id="strategy-stats"></div>
    </div>

    <div class="footer-nav" id="footer-nav"></div>
  </div>

  <script type="module">
    import { getCircuit, getEventForRound, getCurrentEvent, getTodayDayOffset } from './championship.js';
    import { CIRCUITS, SEASON_SCHEDULE } from './data.js';

    const NAT_CODE = {
      'australia':     'au', 'new zealand':  'nz', 'argentina':    'ar',
      'mexico':        'mx', 'japan':        'jp', 'kenya':        'ke',
      'belgium':       'be', 'france':       'fr', 'italy':        'it',
      'germany':       'de', 'czechoslovakia':'cz', 'england':      'gb',
      'sweden':        'se', 'finland':      'fi', 'hong kong':    'hk',
      'canada':        'ca', 'united states':'us', 'pakistan':     'pk',
      'brazil':        'br', 'south africa': 'za',
    };

    (async () => {
    const params    = new URLSearchParams(location.search);
    const circuitId = params.get('circuitId');
    const pSeason   = params.get('season');
    const pRound    = params.get('round');

    let circuit, season, round;
    if (circuitId && CIRCUITS[circuitId]) {
      circuit = CIRCUITS[circuitId];
      const event = getCurrentEvent();
      season = event.season;
      const entry = SEASON_SCHEDULE.find(e => e.circuitId === circuitId && e.eventType === 'race');
      round = entry ? entry.round : null;
    } else if (pSeason && pRound) {
      season = parseInt(pSeason, 10);
      round  = parseInt(pRound,  10);
      const event = getEventForRound(season, round, 'race');
      circuit = event ? getCircuit(event) : null;
    } else {
      circuit = getCircuit(getCurrentEvent());
      const event = getCurrentEvent();
      season = event.season;
      round  = event.round;
    }

    if (!circuit) {
      document.getElementById('main').innerHTML = '<p style="color:var(--lo);font-size:11px">Circuit not found.</p>';
      return;
    }

    document.title = `${circuit.name} — Simple Motor Racing`;

    // ── Info bar
    const roundLabel = round ? `R${round} · ` : '';
    document.getElementById('info-bar').textContent =
      `${roundLabel}${circuit.eventName} — Circuit Guide`;

    // ── Round nav
    if (round) {
      const maxRound = Math.max(...SEASON_SCHEDULE.filter(e => e.eventType === 'race').map(e => e.round));
      const s = season || 1;
      document.getElementById('round-nav').style.display = '';
      document.getElementById('round-label').textContent = `Round ${round} of ${maxRound}`;
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      if (round > 1) {
        btnPrev.href = `circuit.html?season=${s}&round=${round - 1}`;
      } else {
        btnPrev.classList.add('disabled');
      }
      if (round < maxRound) {
        btnNext.href = `circuit.html?season=${s}&round=${round + 1}`;
      } else {
        btnNext.classList.add('disabled');
      }
    }

    // ── Flag
    const flagCode = NAT_CODE[(circuit.country || '').toLowerCase()];
    const flagEl   = document.getElementById('event-flag');
    if (flagCode) {
      flagEl.src   = `https://flagcdn.com/w160/${flagCode}.png`;
      flagEl.alt   = circuit.country;
      flagEl.style.display = '';
    }

    // ── Event name & circuit details
    document.getElementById('event-name').textContent      = circuit.eventName;
    document.getElementById('circuit-name').textContent    = circuit.name;
    const locationParts = [circuit.location, circuit.country].filter(Boolean);
    document.getElementById('circuit-location').textContent = locationParts.join(' · ');
    const metaParts = [circuit.type, circuit.character].filter(Boolean);
    document.getElementById('circuit-meta').textContent    = metaParts.join('  ·  ');
    if (circuit.profile) {
      document.getElementById('circuit-profile').textContent = circuit.profile;
    }

    // ── Track image
    const trackImg = document.getElementById('track-image');
    trackImg.src = `tracks/${circuit.id}.png`;
    trackImg.alt = circuit.name;
    trackImg.style.display = '';
    trackImg.onerror = () => { trackImg.style.display = 'none'; };

    // ── Circuit stats
    const raceDistKm = circuit.lengthKm
      ? (circuit.lengthKm * circuit.totalLaps).toFixed(0) : null;
    const lengthStr = circuit.lengthKm
      ? `${circuit.lengthKm.toFixed(3)} km` : '–';
    const distStr = raceDistKm
      ? `${circuit.totalLaps} laps · ${raceDistKm} km`
      : `${circuit.totalLaps} laps`;

    setStats('circuit-stats', [
      ['Length',        lengthStr],
      ['Race distance', distStr],
      ['Abrasiveness',  abrasiveness(circuit.trackAbrasiveness)],
      ['Overtaking',    overtaking(circuit.overtakingDifficulty)],
    ]);

    // ── Sector characteristics
    const tbody = document.getElementById('sector-tbody');
    circuit.sectors.forEach(sec => {
      const char = sectorCharacter(sec);
      const tr   = document.createElement('tr');
      tr.innerHTML = `
        <td>S${sec.id}</td>
        <td class="sec-label">${sec.label}</td>
        <td class="sec-char ${char.cls}">${char.text}</td>
      `;
      tbody.appendChild(tr);
    });

    // ── Strategy stats
    setStats('strategy-stats', [
      ['Fuel load',  fuelLoad(circuit.baseFuelBurnPerLap)],
      ['Pit lane',   `~${circuit.pitLaneTime}s traversal`],
    ]);

    // ── Footer nav
    const footerNav = document.getElementById('footer-nav');
    footerNav.appendChild(Object.assign(document.createElement('a'), {
      href: 'index.html', className: 'footer-btn', textContent: '← CALENDAR',
    }));
    if (round) {
      const s = season || 1;
      const raceEvent    = getEventForRound(s, round, 'race');
      const isAvailable  = raceEvent && raceEvent.dayOffset <= getTodayDayOffset();
      const activeCls    = isAvailable ? 'footer-btn primary' : 'footer-btn locked';
      footerNav.appendChild(Object.assign(document.createElement('a'), {
        href: isAvailable ? `qualifying.html?season=${s}&round=${round}` : '',
        className: activeCls, textContent: 'QUALIFYING →',
      }));
      footerNav.appendChild(Object.assign(document.createElement('a'), {
        href: isAvailable ? `race.html?season=${s}&round=${round}` : '',
        className: activeCls, textContent: 'RACE →',
      }));
    }

    // ── Helpers
    function setStats(id, rows) {
      const el = document.getElementById(id);
      rows.forEach(([label, value]) => {
        const lEl = document.createElement('div');
        lEl.className = 'stat-label';
        lEl.textContent = label;
        const vEl = document.createElement('div');
        vEl.className = 'stat-value muted';
        vEl.textContent = value;
        el.append(lEl, vEl);
      });
    }

    function abrasiveness(val) {
      if (val <= 0.30) return 'Smooth';
      if (val <= 0.45) return 'Moderate';
      if (val <= 0.55) return 'Aggressive';
      return 'Destructive';
    }

    function overtaking(val) {
      if (!val) return '—';
      if (val <= 0.55) return 'Very difficult';
      if (val <= 0.75) return 'Difficult';
      if (val <= 0.95) return 'Moderate';
      if (val <= 1.10) return 'Average';
      if (val <= 1.30) return 'Good';
      return 'Excellent';
    }

    function fuelLoad(burnPerLap) {
      if (burnPerLap < 1.2)  return 'Low';
      if (burnPerLap <= 1.55) return 'Moderate';
      return 'High';
    }

    function sectorCharacter(sec) {
      const { powerWeight, aeroWeight } = sec;
      if (powerWeight > aeroWeight * 1.5) return { text: 'Power-biased',  cls: 'char-power' };
      if (aeroWeight  > powerWeight * 1.5) return { text: 'Corner-biased', cls: 'char-aero' };
      return { text: 'Balanced', cls: 'char-balanced' };
    }
    })();
  </script>

</body>
</html>
