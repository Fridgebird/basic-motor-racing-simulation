<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Profile — Simple Motor Racing</title>
  <style>
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-weight: bold;
    }

    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--mid);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #topbar {
      width: 100%;
      height: 44px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
    .b-flat { font-size: 15px; color: var(--hi); letter-spacing: 0.04em; flex-shrink: 0; }
    .b-flat em { font-style: normal; color: var(--mid); }
    .topbar-nav { display: flex; gap: 16px; margin-left: auto; margin-right: 16px; }
    .topbar-nav-link { color: var(--lo); text-decoration: none; font-size: 10px; letter-spacing: 0.08em; }
    .topbar-nav-link:hover { color: var(--mid); }

    #info-bar {
      width: 100%;
      background: var(--bg-mid);
      border-bottom: 1px solid var(--border);
      padding: 6px 16px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--lo);
      text-transform: uppercase;
    }

    #page {
      width: 100%;
      max-width: 700px;
      padding: 24px 16px;
    }

    #driver-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .nav-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--lo);
      background: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .nav-btn:hover:not(:disabled) { color: var(--hi); border-color: var(--mid); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }
    #driver-counter { font-size: 9px; letter-spacing: 2px; color: var(--dim); }

    #profile-card {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      border: 1px solid var(--border);
      background: var(--bg-mid);
      padding: 20px;
      margin-bottom: 20px;
    }

    #portrait {
      width: 128px;
      height: 128px;
      flex-shrink: 0;
      background-repeat: no-repeat;
      border: 1px solid var(--border);
    }

    #driver-details { flex: 1; min-width: 0; }

    #driver-name {
      font-size: 20px;
      letter-spacing: 3px;
      color: var(--hi);
      margin-bottom: 4px;
    }
    #driver-meta {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--lo);
      margin-bottom: 16px;
    }

    .team-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .team-dot { width: 3px; height: 16px; flex-shrink: 0; }
    .team-name { font-size: 10px; letter-spacing: 1px; color: var(--mid); }

    .stats-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-block { display: flex; flex-direction: column; gap: 3px; }
    .stat-value { font-size: 18px; color: var(--hi); letter-spacing: 1px; }
    .stat-label { font-size: 8px; letter-spacing: 2px; color: var(--lo); text-transform: uppercase; }

    #season-history { border: 1px solid var(--border); }
    .history-header {
      padding: 6px 12px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--lo);
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
    }
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--lo);
      text-align: left;
      padding: 5px 12px;
      border-bottom: 1px solid var(--border);
    }
    .history-table td {
      padding: 6px 12px;
      font-size: 11px;
      color: var(--mid);
      border-bottom: 1px solid var(--dim);
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table td.h-pos  { color: var(--hi); width: 36px; }
    .history-table td.h-pts  { color: var(--hi); text-align: right; }
    .history-table td.h-wins { color: var(--lo); text-align: right; }
    .champ-marker { color: var(--accent); font-size: 10px; margin-left: 4px; }

    @media (max-width: 500px) {
      #profile-card { flex-direction: column; }
    }
  </style>
</head>

  <div id="topbar">
    <span class="b-flat">Simple <em>Motor Racing</em></span>

    <div id="profile-card">

        </div>
        <div class="stats-row">

          <div class="stat-block"><div class="stat-value" id="stat-races">—</div><div class="stat-label">Races</div></div>
          <div class="stat-block"><div class="stat-value" id="stat-wins">—</div><div class="stat-label">Wins</div></div>

          <div class="stat-block"><div class="stat-value" id="stat-pts">—</div><div class="stat-label">Points</div></div>
        </div>
      </div>
    </div>

        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

    let current = 0;

    function render() {
      const d = DRIVERS[current];
      const portrait = document.getElementById('portrait');
      portrait.style.cssText = spriteStyle(d.row, d.col) + 'width:128px;height:128px;flex-shrink:0;background-repeat:no-repeat;border:1px solid var(--border);';

      document.getElementById('driver-name').textContent    = d.name.toUpperCase();
      document.getElementById('driver-meta').textContent    = d.meta;
      document.getElementById('team-dot').style.background  = d.colour;
      document.getElementById('team-name').textContent      = d.team.toUpperCase();
      document.getElementById('stat-seasons').textContent   = d.stats.seasons;
      document.getElementById('stat-races').textContent     = d.stats.races;
      document.getElementById('stat-wins').textContent      = d.stats.wins;
      document.getElementById('stat-podiums').textContent   = d.stats.podiums;
      document.getElementById('stat-poles').textContent     = d.stats.poles;
      document.getElementById('stat-pts').textContent       = d.stats.pts;
      document.getElementById('driver-counter').textContent = `${current + 1} / ${DRIVERS.length}`;
      document.getElementById('btn-prev').disabled          = current === 0;
      document.getElementById('btn-next').disabled          = current === DRIVERS.length - 1;
      document.getElementById('info-bar').textContent       = `Driver Profile · ${d.name}`;

      const tbody = document.getElementById('history-body');
      tbody.innerHTML = '';
      d.history.forEach(h => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="h-pos">S${h.s}</td>
          <td class="h-team">${h.t.toUpperCase()}${h.champ ? '<span class="champ-marker">★</span>' : ''}</td>
          <td class="h-pos">${h.p}</td>
          <td class="h-pts">${h.pts}</td>
          <td class="h-wins">${h.w}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('btn-prev').addEventListener('click', () => { current--; render(); });
    document.getElementById('btn-next').addEventListener('click', () => { current++; render(); });

    render();
  </script>
