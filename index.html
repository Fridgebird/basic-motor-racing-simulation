<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Motor Racing</title>
  <style>
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-weight: normal;
      font-style: oblique;
    }

    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--hi);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 8px 32px;
    }

    /* ── Topbar ──────────────────────────────────────────────────────────────── */
    #topbar {
      width: 100%;
      max-width: 900px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      margin-bottom: 8px;
    }
    .b-flat {
      font-size: 14px;
      letter-spacing: 3px;
      color: var(--hi);
      text-transform: uppercase;
      line-height: 1;
    }
    .b-flat em { font-style: normal; color: var(--mid); }
    .topbar-nav { display: flex; gap: 16px; margin-left: auto; margin-right: 16px; }
    .topbar-nav-link {
      color: var(--lo);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .topbar-nav-link:hover { color: var(--mid); }

    /* ── Season header ───────────────────────────────────────────────────────── */
    #season-header {
      width: 100%;
      max-width: 900px;
      padding: 10px 4px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    #season-title {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--mid);
      text-transform: uppercase;
    }
    #season-date-range {
      font-size: 9px;
      color: var(--lo);
      letter-spacing: 1px;
    }

    /* ── Calendar table ──────────────────────────────────────────────────────── */
    #calendar-wrap {
      width: 100%;
      max-width: 900px;
    }

    #calendar-table {
      width: 100%;
      border-collapse: collapse;
    }

    #calendar-table th {
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: normal;
      text-align: left;
      padding: 3px 8px 6px;
      border-bottom: 1px solid var(--border);
    }

    #calendar-table td {
      padding: 6px 8px;
      font-size: 11px;
      white-space: nowrap;
    }

    .cal-row {
      border-bottom: 1px solid var(--bg-mid);
    }

    /* Round group separator */
    .cal-row.round-start td {
      padding-top: 12px;
    }

    /* Clickable rows */
    .cal-row.clickable {
      cursor: pointer;
    }
    .cal-row.clickable:hover td {
      background: var(--bg-mid);
    }

    .cal-row.today td { background: rgba(138, 180, 212, 0.06); }
    .cal-row.today.clickable:hover td { background: rgba(138, 180, 212, 0.12); }

    /* Column widths */
    .cal-round   { width: 36px;  color: var(--lo); }
    .cal-event   { width: 90px;  }
    .cal-circuit { width: 160px; color: var(--hi); }
    .cal-country { width: 110px; color: var(--lo); }
    .cal-date    { width: 80px;  color: var(--lo); }
    .cal-status  { width: 120px; text-align: right; }

    /* Status badges */
    .badge {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .badge-upcoming  { color: var(--dim); border: 1px solid var(--dim); }
    .badge-today     { color: var(--accent); border: 1px solid var(--accent); }
    .badge-complete  { color: var(--lo); border: 1px solid var(--dim); }
    .badge-today::before {
      content: '▶ ';
      font-size: 8px;
    }

    /* Event type text */
    .event-qual { color: var(--lo); }
    .event-race { color: var(--mid); }

    /* Greyed upcoming rows */
    .cal-row.upcoming td { color: var(--dim); }
    .cal-row.upcoming .cal-circuit { color: var(--lo); }

    /* ── Dev bar ──────────────────────────────────────────────────────────────── */
    #dev-bar {
      width: 100%;
      max-width: 900px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 6px 8px;
      margin-bottom: 6px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--lo);
    }
    #dev-bar button {
      background: var(--bg-deep);
      color: var(--lo);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
    }
    #dev-bar button:hover { color: var(--mid); border-color: var(--mid); }
    #dev-bar input[type=number] {
      width: 80px;
      background: var(--bg-deep);
      color: var(--mid);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 11px;
      padding: 2px 4px;
    }
    .dev-label { color: var(--dim); }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────────────── -->
  <div id="topbar">
    <div class="b-flat">Simple <em>Motor Racing</em></div>
    <nav class="topbar-nav">
      <a href="standings.html" class="topbar-nav-link">STANDINGS</a>
    </nav>
  </div>

  <!-- ── Dev bar ──────────────────────────────────────────────────────────────── -->
  <div id="dev-bar">
    <button id="dev-prev">◀ PREV</button>
    <span id="dev-label"></span>
    <button id="dev-next">NEXT ▶</button>
    <span class="dev-label">KEY:</span>
    <input type="number" id="world-seed-input">
    <button id="dev-reset" style="margin-left:8px;color:#cc2233;border-color:#cc2233">RESET WORLD</button>
    <button id="dev-exit" style="color:#cc2233;border-color:#cc2233">EXIT DEV</button>
  </div>

  <!-- ── Season header ────────────────────────────────────────────────────────── -->
  <div id="season-header">
    <span id="season-title">–</span>
    <span id="season-date-range">–</span>
  </div>

  <!-- ── Calendar ─────────────────────────────────────────────────────────────── -->
  <div id="calendar-wrap">
    <table id="calendar-table">
      <thead>
        <tr>
          <th class="cal-round">RND</th>
          <th class="cal-event">EVENT</th>
          <th class="cal-circuit">CIRCUIT</th>
          <th class="cal-country">COUNTRY</th>
          <th class="cal-date">DATE</th>
          <th class="cal-status">STATUS</th>
        </tr>
      </thead>
      <tbody id="calendar-body"></tbody>
    </table>
  </div>

  <script type="module">
    import {
      getCurrentEvent, getCircuit, getEventForRound,
      getTodayDayOffset, getWorldSeed, setWorldSeed,
      advanceDevEvent, retreatDevEvent, isDevMode, enterDevMode, exitDevMode,
      resetWorld, getEventDate, formatShortDate,
    } from './championship.js';
    import { SEASON_SCHEDULE } from './data.js';

    // ── Dev mode entry via ?dev=1 ──────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get('dev') === '1') {
      enterDevMode();
      // Strip the param from the URL so it doesn't persist visibly
      history.replaceState(null, '', location.pathname);
    }

    // ── Resolve context ────────────────────────────────────────────────────────
    const todayOffset  = getTodayDayOffset();
    const currentEvent = getCurrentEvent();
    const season       = currentEvent.season;
    const schedLen     = SEASON_SCHEDULE.length;

    // ── Season header ──────────────────────────────────────────────────────────
    document.getElementById('season-title').textContent =
      `S${season} · ${2026 + season - 1} Season Calendar`;

    const seasonStart = (season - 1) * schedLen;
    const seasonEnd   = season * schedLen - 1;
    document.getElementById('season-date-range').textContent =
      `${formatShortDate(getEventDate(seasonStart))} – ${formatShortDate(getEventDate(seasonEnd))}`;

    // ── Dev bar ────────────────────────────────────────────────────────────────
    const devBar = document.getElementById('dev-bar');
    if (isDevMode()) {
      const todayDateStr  = formatShortDate(getEventDate(todayOffset));
      const todayEventStr = `${currentEvent.eventType === 'qualifying' ? 'Qualifying' : 'Race'} — R${currentEvent.round} · S${currentEvent.season}`;

      devBar.style.display = 'flex';
      document.getElementById('dev-label').textContent =
        `DEV · Day ${todayOffset} · ${todayDateStr} · ${todayEventStr}`;
      document.getElementById('world-seed-input').value = getWorldSeed();

      document.getElementById('dev-prev').addEventListener('click', () => {
        retreatDevEvent(); location.reload();
      });
      document.getElementById('dev-next').addEventListener('click', () => {
        advanceDevEvent(); location.reload();
      });
      document.getElementById('world-seed-input').addEventListener('change', e => {
        setWorldSeed(parseInt(e.target.value, 10) || 0);
        location.reload();
      });
      document.getElementById('dev-reset').addEventListener('click', () => {
        if (confirm('Clear all race and qualifying results? This cannot be undone.')) {
          resetWorld(); location.reload();
        }
      });
      document.getElementById('dev-exit').addEventListener('click', () => {
        exitDevMode(); location.reload();
      });
    }

    // ── Build calendar rows ────────────────────────────────────────────────────
    const tbody = document.getElementById('calendar-body');
    let prevRound = null;

    SEASON_SCHEDULE.forEach((entry, idx) => {
      const absoluteDayOffset = seasonStart + idx;
      const circuit = getCircuit(entry);
      const dateStr = getEventDate(absoluteDayOffset);
      const dateLabel = formatShortDate(dateStr);

      // Determine status
      let status, badgeClass, rowClass;
      if (absoluteDayOffset < todayOffset) {
        status = 'COMPLETE';
        badgeClass = 'badge-complete';
        rowClass   = 'complete';
      } else if (absoluteDayOffset === todayOffset) {
        status = 'TODAY';
        badgeClass = 'badge-today';
        rowClass   = 'today';
      } else {
        status = 'UPCOMING';
        badgeClass = 'badge-upcoming';
        rowClass   = 'upcoming';
      }

      const isClickable = absoluteDayOffset <= todayOffset;
      const isRoundStart = entry.round !== prevRound;
      prevRound = entry.round;

      const href = entry.eventType === 'qualifying'
        ? `qualifying.html?season=${season}&round=${entry.round}`
        : `race.html?season=${season}&round=${entry.round}`;

      const tr = document.createElement('tr');
      tr.className = `cal-row ${rowClass}${isClickable ? ' clickable' : ''}${isRoundStart ? ' round-start' : ''}`;

      const eventLabel = entry.eventType === 'qualifying' ? 'Qualifying' : 'Race';
      const eventClass = entry.eventType === 'qualifying' ? 'event-qual' : 'event-race';

      tr.innerHTML = `
        <td class="cal-round">${isRoundStart ? `R${entry.round}` : ''}</td>
        <td class="cal-event ${eventClass}">${eventLabel}</td>
        <td class="cal-circuit">${circuit.name}</td>
        <td class="cal-country">${circuit.country}</td>
        <td class="cal-date">${dateLabel}</td>
        <td class="cal-status"><span class="badge ${badgeClass}">${status}</span></td>
      `;

      if (isClickable) {
        tr.addEventListener('click', () => { window.location.href = href; });
      }

      tbody.appendChild(tr);
    });
  </script>

</body>
</html>
