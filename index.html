<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor Racing Simulation</title>
  <style>
    /* Spectrum-style page: black background, centred canvas */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 16px;
      font-family: "Courier New", Courier, monospace;
      color: #fff;
    }

    canvas {
      display: block;
      /* 2× pixel scaling for chunky Spectrum aesthetic */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #controls {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      background: #000;
      color: #00ffff;
      border: 1px solid #00ffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      padding: 5px 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover  { background: #00ffff; color: #000; }
    button:active { background: #00aaaa; color: #000; }
    button:disabled {
      border-color: #444;
      color: #444;
      cursor: default;
      background: #000;
    }

    #speed-label {
      color: #00ffff;
      font-size: 13px;
    }

    select {
      background: #000;
      color: #00ffff;
      border: 1px solid #00ffff;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      padding: 4px 8px;
    }

    #seed-input {
      background: #000;
      color: #ffff00;
      border: 1px solid #ffff00;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      padding: 4px 8px;
      width: 100px;
    }

    #seed-label { color: #ffff00; font-size: 13px; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="controls">
    <button id="btn-start">START RACE</button>
    <button id="btn-pause" disabled>PAUSE</button>
    <button id="btn-reset" disabled>RESET</button>

    <span id="seed-label">SEED:</span>
    <input id="seed-input" type="number" value="198804" min="1" max="9999999">

    <span id="speed-label">SPEED:</span>
    <select id="speed-select">
      <option value="400">SLOW (1 LAP / 0.4s)</option>
      <option value="150" selected>NORMAL (1 LAP / 0.15s)</option>
      <option value="50">FAST (1 LAP / 0.05s)</option>
      <option value="0">MAX (no delay)</option>
    </select>
  </div>

  <script type="module">
    import { CANVAS_W, CANVAS_H, Renderer } from './renderer.js';
    import { initRace, cars, race }         from './state.js';
    import { tick, isRaceOver }             from './simulation.js';

    // ── Canvas setup ───────────────────────────────────────────────────────
    const canvas  = document.getElementById('canvas');
    canvas.width  = CANVAS_W;
    canvas.height = CANVAS_H;
    // 2× CSS scaling for chunky pixel look
    canvas.style.width  = `${CANVAS_W * 2}px`;
    canvas.style.height = `${CANVAS_H * 2}px`;

    const renderer = new Renderer(canvas);

    // ── State ──────────────────────────────────────────────────────────────
    let rng      = null;
    let loopId   = null;   // setTimeout handle
    let paused   = false;

    // ── Controls ───────────────────────────────────────────────────────────
    const btnStart  = document.getElementById('btn-start');
    const btnPause  = document.getElementById('btn-pause');
    const btnReset  = document.getElementById('btn-reset');
    const seedInput = document.getElementById('seed-input');
    const speedSel  = document.getElementById('speed-select');

    btnStart.addEventListener('click', startRace);
    btnPause.addEventListener('click', togglePause);
    btnReset.addEventListener('click', resetRace);

    // ── Initial blank render ───────────────────────────────────────────────
    renderer.render();

    // ── startRace ──────────────────────────────────────────────────────────
    function startRace() {
      const seed    = parseInt(seedInput.value, 10) || 198804;
      window._raceSeed = seed;  // picked up by renderer footer

      rng = initRace(seed);
      paused = false;

      btnStart.disabled = true;
      btnPause.disabled = false;
      btnReset.disabled = false;
      seedInput.disabled = true;

      renderer.render();  // show grid / pre-race state
      scheduleNextLap();
    }

    // ── Game loop ──────────────────────────────────────────────────────────
    // Advances one full lap (3 sector ticks) per iteration, then re-renders.
    // The delay between laps is controlled by the speed selector.
    function advanceLap() {
      if (paused || isRaceOver()) return;

      // Run 3 sector ticks (one complete lap)
      for (let s = 0; s < 3; s++) {
        tick(rng);
      }

      renderer.render();

      if (isRaceOver()) {
        onRaceFinished();
      } else {
        scheduleNextLap();
      }
    }

    function scheduleNextLap() {
      const delay = parseInt(speedSel.value, 10);
      if (delay === 0) {
        // Max speed: use setTimeout(0) to stay non-blocking but yield to the browser
        loopId = setTimeout(advanceLap, 0);
      } else {
        loopId = setTimeout(advanceLap, delay);
      }
    }

    // ── togglePause ────────────────────────────────────────────────────────
    function togglePause() {
      paused = !paused;
      btnPause.textContent = paused ? 'RESUME' : 'PAUSE';
      if (!paused && !isRaceOver()) {
        scheduleNextLap();
      }
    }

    // ── resetRace ──────────────────────────────────────────────────────────
    function resetRace() {
      clearTimeout(loopId);
      paused = false;

      btnStart.disabled  = false;
      btnPause.disabled  = true;
      btnPause.textContent = 'PAUSE';
      btnReset.disabled  = true;
      seedInput.disabled = false;

      // Clear state by re-rendering a blank pre-race display
      // (full re-init happens on next Start)
      rng = null;
      renderer.prevPositions.clear();
      renderer.render();
    }

    // ── onRaceFinished ─────────────────────────────────────────────────────
    function onRaceFinished() {
      btnPause.disabled = true;
      renderer.render();  // final render with FINISHED status
      console.log('Race complete. Full log available at: window.raceLog');
    }

    // Expose race log to browser console for debugging / tuning
    import('./state.js').then(m => { window.raceLog = m.raceLog; });
  </script>

</body>
</html>
