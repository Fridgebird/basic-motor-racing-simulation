<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qualifying — Simple Motor Racing</title>
  <style>
    /* ── Fonts ─────────────────────────────────────────────────────────────── */
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-display: swap;
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-display: swap;
      font-weight: normal;
      font-style: oblique;
    }

    /* ── Design tokens ──────────────────────────────────────────────────────── */
    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--mid);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    /* ── Sticky header ──────────────────────────────────────────────────────── */
    #sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      box-shadow: 0 3px 12px rgba(0,0,0,0.6);
    }

    /* ── Topbar ─────────────────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 44px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
    }
    .b-flat {
      font-family: 'Square', monospace;
      font-size: 15px;
      font-weight: normal;
      color: var(--hi);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .b-flat em { font-style: normal; color: var(--mid); }

    .topbar-nav {
      display: flex;
      gap: 16px;
      margin-left: auto;
      margin-right: 16px;
    }
    .topbar-nav-link {
      color: var(--lo);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .topbar-nav-link:hover { color: var(--mid); }
    .topbar-nav-link.current { color: var(--mid); }
    .topbar-nav-link.active { color: var(--mid); }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--lo);
    }

    /* ── Info bar ───────────────────────────────────────────────────────────── */
    #race-info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--lo);
      letter-spacing: 0.06em;
    }
    #circuit-name { color: var(--mid); }

    /* ── Main layout ────────────────────────────────────────────────────────── */
    #main {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      max-width: 900px;
    }

    /* ── On-track panel ─────────────────────────────────────────────────────── */
    #on-track-panel {
      width: 280px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 10px;
      color: var(--lo);
      letter-spacing: 0.10em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    #quali-forecast {
      font-size: 9px;
      letter-spacing: 0.04em;
      color: var(--lo);
      padding: 6px 0 2px;
    }

    #run-order-section {
      padding: 8px 16px 6px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-mid);
      max-width: 900px;
    }
    #run-order-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }
    #run-order-strip::-webkit-scrollbar { display: none; }
    .rq-pip {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0;
      border-radius: 2px;
    }

    #quali-weather-strip {
      font-size: 10px;
      letter-spacing: 0.04em;
      padding: 4px 0 8px;
      margin-bottom: 2px;
    }

    #driver-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    #driver-colour-bar {
      width: 4px;
      height: 48px;
      border-radius: 2px;
      background: var(--dim);
      flex-shrink: 0;
    }
    #driver-portrait {
      width: 48px; height: 48px; flex-shrink: 0;
      border: 1px solid var(--border);
      background-color: var(--dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: bold; color: var(--lo);
      overflow: hidden;
    }
    #current-driver-name {
      font-size: 14px;
      color: var(--hi);
      margin-bottom: 2px;
    }
    #current-team-name {
      font-size: 10px;
      color: var(--lo);
    }


    .sector-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .sector-cell {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 4px;
      text-align: center;
    }
    .sector-cell .s-label { font-size: 9px; color: var(--lo); display: block; margin-bottom: 3px; letter-spacing: 0.08em; }
    .sector-cell .s-time  { font-size: 13px; color: var(--mid); display: block; }
    .sector-cell .s-gap   { font-size: 9px; color: var(--lo); display: block; margin-top: 2px; min-height: 11px; }
    .sector-cell.done     { border-color: var(--lo); }
    .sector-cell.done .s-time { color: var(--hi); }
    .sector-cell.slow .s-time { color: #e8c400; }
    .sector-cell.purple   { border-color: #cc44ff; }
    .sector-cell.purple .s-time { color: #cc44ff; }
    .sector-cell.purple .s-gap  { color: #cc44ff; }

    #time-pos-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    #lap-time-display {
      flex: 1;
      min-width: 0;
      font-size: 20px;
      color: var(--hi);
      text-align: center;
      padding: 10px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      height: 68px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    #lap-time-display.no-time { color: var(--lo); font-size: 13px; }
    #lap-time-display.purple  { color: #cc44ff; }
    #pos-display {
      width: 64px;
      flex-shrink: 0;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    #pos-display .pos-label { font-size: 9px; color: var(--lo); letter-spacing: 0.10em; }
    #pos-display .pos-value { font-size: 34px; color: var(--lo); line-height: 1; }
    #pos-display .pos-value.p1 { color: var(--hi); }

    #draw-progress {
      font-size: 10px;
      color: var(--lo);
      text-align: center;
      margin-bottom: 12px;
    }

    #btn-start-quali, #btn-replay-quali, #btn-rerun-quali, #btn-goto-race, #btn-goto-quali-result, #btn-pause-quali {
      width: 100%;
      padding: 8px;
      font-family: 'Square', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg-mid);
      color: var(--mid);
      margin-bottom: 6px;
    }
    #btn-start-quali:hover, #btn-replay-quali:hover, #btn-rerun-quali:hover, #btn-goto-race:hover, #btn-goto-quali-result:hover, #btn-pause-quali:hover { border-color: var(--lo); color: var(--hi); }
    #btn-start-quali:disabled { opacity: 0.4; cursor: default; }
    #btn-goto-race         { display: none; border-color: var(--lo); }
    #btn-goto-quali-result { display: none; border-color: var(--lo); }
    #btn-pause-quali       { display: none; }

    /* ── Leaderboard ────────────────────────────────────────────────────────── */
    #leaderboard-panel { flex: 1; min-width: 0; }

    #quali-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    #quali-table th {
      text-align: left;
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    #quali-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--dim);
      color: var(--mid);
    }
    #quali-table tr.on-track td { background: rgba(138,180,212,0.06); }
    #quali-table td.col-pos    { color: var(--lo); width: 28px; }
    #quali-table td.col-pos.p1 { color: var(--hi); }
    #quali-table td.col-driver { color: var(--hi); }
    #quali-table td.col-team   { color: var(--lo); font-size: 10px; }
    #quali-table td.col-time.purple { color: #cc44ff; }
    #quali-table td.col-no-time     { color: var(--lo); font-size: 10px; }
    #quali-table td.col-gap         { color: var(--lo); }
    .team-dot-inline {
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 1px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Speed control ──────────────────────────────────────────────────────── */
    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      color: var(--lo);
    }
    .control-row select {
      background: var(--bg-mid);
      color: var(--mid);
      border: 1px solid var(--border);
      font-family: 'Square', monospace;
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 2px;
    }

    /* ── Qualifying commentary ───────────────────────────────────────────────── */
    #quali-commentary {
      margin-bottom: 10px;
      font-size: 10px;
      line-height: 1.7;
      height: 76px;
      overflow-y: auto;
      letter-spacing: 0.04em;
    }
    #quali-commentary::-webkit-scrollbar { display: none; }

    /* ── Driver car image ────────────────────────────────────────────────────── */
    #driver-car-image {
      width: 90px;
      height: 48px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    #driver-car-image img {
      max-height: 44px;
      max-width: 90px;
      object-fit: contain;
      object-position: right center;
    }
    .qc-perfect  { color: var(--mid); }
    .qc-sloppy   { color: var(--lo); }
    .qc-lockup   { color: #e8c400; }
    .qc-spin     { color: #ff8800; }
    .qc-crash    { color: #ff4444; }
    .qc-weather  { color: #88aacc; }

    /* ── Responsive: stack panels on narrow screens ─────────────────────────── */
    @media (max-width: 640px) {
      #main { flex-direction: column; }
      #on-track-panel { width: 100%; }
    }
  </style>
  <link rel="stylesheet" href="topnav.css">
  <script src="topnav.js" defer></script>
</head>
<body>

  <div id="sticky-header">
    <!-- ── Topbar ────────────────────────────────────────────────────────────── -->
    <div id="topbar">
      <div class="b-flat">Simple <em>Motor Racing</em></div>
      <nav class="topbar-nav">
        <a href="index.html" class="topbar-nav-link">HOME</a>
        <a href="calendar.html" class="topbar-nav-link">CALENDAR</a>
        <a href="drivers.html" class="topbar-nav-link">DRIVERS</a>
        <a href="team.html" class="topbar-nav-link">TEAMS</a>
        <a href="standings.html" class="topbar-nav-link">STANDINGS</a>
        <a href="champions.html" class="topbar-nav-link">CHAMPIONS</a>
      </nav>
      <div class="topbar-meta">
        <div id="topbar-status">QUALIFYING</div>
      </div>
    </div>

    <!-- ── Info bar ──────────────────────────────────────────────────────────── -->
    <div id="race-info-bar">
      <span id="circuit-name">–</span>
      <span id="session-status">–</span>
    </div>
  </div>

  <!-- ── Run order strip ─────────────────────────────────────────────────────── -->
  <div id="run-order-section" style="display:none">
    <div id="run-order-strip"></div>
  </div>

  <!-- ── Main ────────────────────────────────────────────────────────────────── -->
  <div id="main">

    <!-- On-track panel -->
    <div id="on-track-panel">

      <div class="control-row">
        <label>Speed</label>
        <select id="speed-select">
          <option value="200">Fast</option>
          <option value="2350">Normal</option>
          <option value="4500" selected>Slow</option>
          <option value="0">Instant</option>
        </select>
      </div>

      <button id="btn-start-quali">START QUALIFYING</button>
      <div id="quali-forecast"></div>
      <button id="btn-pause-quali">PAUSE</button>
      <button id="btn-goto-quali-result">QUALIFYING RESULT →</button>
      <button id="btn-goto-race">GO TO RACE →</button>

      <div class="panel-title" style="margin-top:12px">ON TRACK</div>

      <div id="quali-weather-strip" style="display:none"></div>

      <div id="driver-info-row">
        <div id="driver-colour-bar"></div>
        <div id="driver-portrait"></div>
        <div style="flex:1;min-width:0;overflow:hidden">
          <div id="current-driver-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
          <div id="current-team-name"></div>
        </div>
        <div id="driver-car-image">
          <img src="car_sprites_profile_1930_dbr_8_transparent.png" alt="" onerror="this.parentElement.style.display='none'">
        </div>
      </div>

      <div class="sector-grid">
        <div class="sector-cell" id="sc1">
          <span class="s-label">Sector 1</span>
          <span class="s-time" id="st1">–</span>
          <span class="s-gap"  id="sg1"></span>
        </div>
        <div class="sector-cell" id="sc2">
          <span class="s-label">Sector 2</span>
          <span class="s-time" id="st2">–</span>
          <span class="s-gap"  id="sg2"></span>
        </div>
        <div class="sector-cell" id="sc3">
          <span class="s-label">Sector 3</span>
          <span class="s-time" id="st3">–</span>
          <span class="s-gap"  id="sg3"></span>
        </div>
      </div>

      <div id="time-pos-row">
        <div id="lap-time-display">–</div>
        <div id="pos-display">
          <span class="pos-label">POS</span>
          <span class="pos-value" id="pos-value">–</span>
        </div>
      </div>
      <div id="quali-commentary"></div>
      <div id="draw-progress"></div>

    </div>

    <!-- Leaderboard panel -->
    <div id="leaderboard-panel">
      <div class="panel-title">PROVISIONAL CLASSIFICATION</div>
      <table id="quali-table">
        <thead>
          <tr>
            <th>POS</th>
            <th>#</th>
            <th>DRIVER</th>
            <th>TEAM</th>
            <th>LAP TIME</th>
            <th>GAP</th>
          </tr>
        </thead>
        <tbody id="quali-tbody"></tbody>
      </table>
    </div>

  </div>

  <script type="module">
    import { initRace, cars, race }                  from './state.js';
    import { setCurrentCircuit, runQualifyingSession, simulateQualiLap, initStrategies, initWeather, tickQualiWeather, runRace, getTrackStateLabel, getSkyStateLabel, getWeatherForecastLabel } from './simulation.js';
    import {
      getCurrentEvent, getCircuit, getSeedForEvent, getEventForRound,
      saveQualiResults, loadQualiResults, resetWorld,
      advanceDevEvent, retreatDevEvent, isDevMode, enterDevMode, exitDevMode,
      getWorldSeed, setWorldSeed, getTodayDayOffset, getEventDate, formatShortDate,
      ensurePastResultsCached,
    } from './championship.js';
    import { getSeasonSnapshot, getDisplayYear } from './worldstate.js';

    // ── Dev mode entry via ?dev=1 ──────────────────────────────────────────────
    const params  = new URLSearchParams(location.search);
    if (params.get('dev') === '1') {
      enterDevMode();
      const cleanParams = new URLSearchParams();
      if (params.get('season')) cleanParams.set('season', params.get('season'));
      if (params.get('round'))  cleanParams.set('round',  params.get('round'));
      const qs = cleanParams.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
    }

    // ── Championship context ───────────────────────────────────────────────────
    const pSeason = params.get('season');
    const pRound  = params.get('round');

    const event = (pSeason && pRound)
      ? getEventForRound(parseInt(pSeason, 10), parseInt(pRound, 10), 'qualifying')
      : getCurrentEvent();

    const circuit   = getCircuit(event);
    const worldSeed = getWorldSeed();
    const seed      = getSeedForEvent(event, worldSeed);
    setCurrentCircuit(circuit, getDisplayYear(event.season));
    const simFns = { initRace, cars, runRace, initStrategies, initWeather, setCurrentCircuit, runQualifyingSession, getSeasonSnapshot };
    if (event.season > 1) await ensurePastResultsCached(event.season - 1, simFns);
    const snapshot  = getSeasonSnapshot(event.season, worldSeed);

    // Info bar
    document.getElementById('circuit-name').textContent =
      `${1929 + event.season} Round ${event.round} · ${circuit.eventName} — Qualifying · ${circuit.name}, ${circuit.country}`;

    // ── Dev bar ────────────────────────────────────────────────────────────────
    if (isDevMode()) {
      const todayOff     = getTodayDayOffset();
      const todayDateStr = formatShortDate(getEventDate(todayOff));
      const devBar = document.createElement('div');
      devBar.style.cssText = 'width:100%;max-width:1100px;padding:4px 8px;font-size:11px;color:#4a6a88;background:#080c12;border:1px solid #1e2f44;border-top:none;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
      devBar.innerHTML = `
        <button id="db-prev" style="padding:2px 8px">◀ PREV</button>
        <span>DEV · Day ${todayOff} · ${todayDateStr} · R${event.round} Qualifying — ${circuit.eventName}</span>
        <button id="db-next" style="padding:2px 8px">NEXT ▶</button>
        <span style="color:#2a4055">KEY:</span>
        <input id="db-seed" type="number" value="${worldSeed}" style="width:80px;background:#080c12;color:#8ab4d4;border:1px solid #1e2f44;font-family:inherit;font-size:11px;padding:2px 4px;">
        <button id="db-reset" style="padding:2px 8px;color:#cc2233;border-color:#cc2233">RESET WORLD</button>
        <button id="db-exit" style="padding:2px 8px;color:#cc2233;border-color:#cc2233">EXIT DEV</button>
      `;
      document.getElementById('topbar').insertAdjacentElement('afterend', devBar);
      devBar.querySelector('#db-prev').addEventListener('click', () => { retreatDevEvent(); location.reload(); });
      devBar.querySelector('#db-next').addEventListener('click', () => { advanceDevEvent(); location.reload(); });
      devBar.querySelector('#db-seed').addEventListener('change', e => { setWorldSeed(parseInt(e.target.value, 10) || 0); location.reload(); });
      devBar.querySelector('#db-reset').addEventListener('click', () => {
        if (confirm('Clear all race and qualifying results? This cannot be undone.')) {
          resetWorld(); location.reload();
        }
      });
      devBar.querySelector('#db-exit').addEventListener('click', () => { exitDevMode(); location.href = 'index.html'; });
    }

    // ── State ──────────────────────────────────────────────────────────────────
    let qualiResults    = null;
    let sessionDone     = false;
    let bestSectorTimes = [null, null, null];  // fastest sector time per sector across all drivers
    let poleSectorTimes = null;                // sector times of current provisional P1
    let paused          = false;

    const speedSel    = document.getElementById('speed-select');
    const btnStart          = document.getElementById('btn-start-quali');
    const btnPause          = document.getElementById('btn-pause-quali');
    const btnGotoRace       = document.getElementById('btn-goto-race');
    const btnGotoQualiResult = document.getElementById('btn-goto-quali-result');

    // Team colours and labels — built synchronously from snapshot (snapshot already computed above).
    const teamColours = {};
    const teamLabels  = {};  // teamId → "SHORTNAME - ENGINE"
    snapshot.teams.forEach(t => {
      teamColours[t.id] = t.colour;
      const engineName  = snapshot.engines[t.engine]?.name ?? '';
      const teamUp      = t.shortName.toUpperCase();
      const engineUp    = engineName.toUpperCase();
      teamLabels[t.id]  = (!engineName || teamUp === engineUp)
        ? teamUp
        : `${teamUp} - ${engineUp}`;
    });

    const activeSeed = seed;

    function getContrastColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.55 ? '#000000' : '#ffffff';
    }

    // Preview weather forecast and run order by silently running initRace + initWeather + shuffle.
    // initRace resets all state deterministically, so clicking START later produces identical results.
    function showForecast(s) {
      const previewRng = initRace(s, null, circuit, snapshot);
      initWeather(previewRng, cars.length);
      document.getElementById('quali-forecast').textContent = getWeatherForecastLabel('qualifying');

      // Reproduce the Fisher-Yates shuffle (same algorithm as runQualifyingSessionAnimated)
      const previewOrder = [...cars];
      for (let i = previewOrder.length - 1; i > 0; i--) {
        const j = Math.floor(previewRng() * (i + 1));
        [previewOrder[i], previewOrder[j]] = [previewOrder[j], previewOrder[i]];
      }
      const strip = document.getElementById('run-order-strip');
      strip.innerHTML = '';
      previewOrder.forEach(car => {
        const bg  = teamColours[car.team.id] || '#2a4055';
        const pip = document.createElement('div');
        pip.className   = 'rq-pip';
        pip.textContent = car.driver.number;
        pip.style.background = bg;
        pip.style.color      = getContrastColor(bg);
        strip.appendChild(pip);
      });
      document.getElementById('run-order-section').style.display = '';
    }
    showForecast(activeSeed);


    // ── Day-gating ─────────────────────────────────────────────────────────────
    const isQualiAvailable = event.dayOffset <= getTodayDayOffset();
    if (!isQualiAvailable) {
      btnStart.disabled = true;
      btnStart.title    = 'Qualifying session not yet available';
    }

    // ── Check for cached results ───────────────────────────────────────────────
    // If results exist, silently store them so clicking Start replays the animation
    // with the same seed (same result). The result table is available on the calendar page.
    const cached = loadQualiResults(event.season, event.round);
    if (cached) {
      qualiResults = cached;
    }

    // ── Start qualifying ───────────────────────────────────────────────────────
    btnStart.addEventListener('click', async () => {
      btnStart.disabled        = true;
      btnPause.style.display   = 'block';
      bestSectorTimes = [null, null, null];
      poleSectorTimes = null;
      document.getElementById('session-status').textContent = 'SESSION RUNNING';
      document.getElementById('quali-forecast').style.display = 'none';

      // Init cars — rolls setups (qualifying seed)
      const rng = initRace(activeSeed, null, circuit, snapshot);

      // Run session with animation
      qualiResults = await runQualifyingSessionAnimated(rng, circuit);

      // Persist (guard: don't overwrite a silently-computed result — they'd be identical)
      if (!loadQualiResults(event.season, event.round)) {
        saveQualiResults(event.season, event.round, qualiResults);
      }

      sessionDone              = true;
      paused                   = false;
      btnPause.style.display             = 'none';
      document.getElementById('session-status').textContent = 'SESSION COMPLETE';
      btnGotoQualiResult.style.display   = 'block';
      btnGotoRace.style.display          = 'block';
      clearOnTrackPanel();
    });

    btnGotoQualiResult.addEventListener('click', () => {
      window.location.href = `results.html?season=${event.season}&round=${event.round}&type=qualifying`;
    });

    btnGotoRace.addEventListener('click', () => {
      window.location.href = `race.html?season=${event.season}&round=${event.round}`;
    });

    btnPause.addEventListener('click', () => {
      paused = !paused;
      btnPause.textContent = paused ? 'RESUME' : 'PAUSE';
      if (paused) {
        document.getElementById('session-status').textContent = 'PAUSED';
      } else {
        document.getElementById('session-status').textContent = 'SESSION RUNNING';
      }
    });

    // ── Qualifying commentary helpers ──────────────────────────────────────────
    const QUALI_SECTOR_TEXT = {
      perfect: [
        'Sector 1 — nails the opening sector',
        'Sector 2 — faultless through the middle section',
        'Sector 3 — perfect in the final sector',
      ],
      sloppy: [
        'Sector 1 — slightly untidy through the first sector',
        'Sector 2 — loses a little through the middle section',
        'Sector 3 — slight wobble in the final sector',
      ],
      lockup: [
        'Sector 1 — lock-up under braking, time lost',
        'Sector 2 — lock-up through the braking zone',
        'Sector 3 — lock-up at the final complex',
      ],
      spin: [
        'Sector 1 — spin! Lap in serious trouble',
        'Sector 2 — spin through the chicane!',
        'Sector 3 — spin at the final corner!',
      ],
    };

    function addQualiCommentary(text, style) {
      const feed = document.getElementById('quali-commentary');
      if (!feed) return;
      const el = document.createElement('div');
      el.className = `qc-${style}`;
      el.textContent = text;
      feed.appendChild(el);
      feed.scrollTop = feed.scrollHeight;
    }

    // ── Weather display helpers ────────────────────────────────────────────────
    const TRACK_COLORS = { dry: '#888888', greasy: '#c8a020', damp: '#6699bb', wet: '#22aaee', flooding: '#aa22ee' };
    const SKY_ICONS    = { 'blue skies': '☀', overcast: '☁', threatening: '⛅', drizzling: '☂', raining: '☔', torrential: '⛈' };
    const SKY_COLORS   = { 'blue skies': '#ffdd44', overcast: '#aaaaaa', threatening: '#888888', drizzling: '#88aacc', raining: '#4488bb', torrential: '#2244aa' };

    function updateWeatherStrip(weatherInfo) {
      const el = document.getElementById('quali-weather-strip');
      if (!weatherInfo || !race.weatherScenario) {
        el.style.display = 'none';
        return;
      }
      const trackLabel = getTrackStateLabel(weatherInfo.trackWetness);
      const skyLabel   = getSkyStateLabel(weatherInfo.weatherState, race.weatherScenario, weatherInfo.lap ?? 0);
      const tc   = TRACK_COLORS[trackLabel] || '#888888';
      const sc   = SKY_COLORS[skyLabel]     || 'var(--lo)';
      const icon = SKY_ICONS[skyLabel]      || '';
      const compound = weatherInfo.compound === 'wet' ? ' · <span style="color:#22aaee">WET TYRE</span>' : '';
      el.innerHTML = `<span style="color:${tc}">${trackLabel} track</span> · <span style="color:${sc}">${skyLabel} ${icon}</span>${compound}`;
      el.style.display = '';
    }

    // ── Animated qualifying session ────────────────────────────────────────────
    // Uses simulateQualiLap's onSector callback for sector-by-sector animation.
    async function runQualifyingSessionAnimated(rng, circuit) {
      // Init weather before the shuffle — must match runQualifyingSession's rng order exactly.
      initWeather(rng, cars.length);

      // Show weather strip immediately for any non-FINE scenario
      updateWeatherStrip({
        compound:     race.trackWetness >= 0.40 ? 'wet' : 'soft',
        trackWetness: race.trackWetness,
        weatherState: race.weatherState,
        lap:          0,
      });

      // Fisher-Yates shuffle (same algorithm as runQualifyingSession — must match)
      const drawOrder = [...cars];
      for (let i = drawOrder.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [drawOrder[i], drawOrder[j]] = [drawOrder[j], drawOrder[i]];
      }

      const rawResults = [];
      const sectorPause = () => parseInt(speedSel.value, 10) / 3;

      const runOrderStrip   = document.getElementById('run-order-strip');
      const runOrderSection = document.getElementById('run-order-section');

      for (let drawIndex = 0; drawIndex < drawOrder.length; drawIndex++) {
        const car            = drawOrder[drawIndex];
        const trackEvolution = drawOrder.length > 1 ? drawIndex / (drawOrder.length - 1) : 0;

        // Pop this driver's pip — they're now on track, not upcoming
        if (runOrderStrip.firstChild) runOrderStrip.removeChild(runOrderStrip.firstChild);
        if (!runOrderStrip.hasChildNodes()) runOrderSection.style.display = 'none';

        // Show weather conditions before the driver goes out
        const prelapWeatherInfo = race.weatherScenario
          ? { compound: race.trackWetness >= 0.40 ? 'wet' : 'soft', trackWetness: race.trackWetness, weatherState: race.weatherState, lap: drawIndex }
          : null;
        updateWeatherStrip(prelapWeatherInfo);

        showOnTrack(car, drawIndex, drawOrder.length);
        resetSectorCells();
        document.getElementById('quali-commentary').innerHTML = '';
        const lapEvents = [];

        // simulateQualiLap calls onSector after each sector — we show it then wait
        const result = await simulateQualiLap(car, rng, circuit, trackEvolution,
          async (sectorIndex, sectorTime, eventType, retired, weatherInfo) => {
            await delay(sectorPause());
            // Update weather strip to reflect the compound in use; lap = drawIndex for sky state
            if (weatherInfo) updateWeatherStrip({ ...weatherInfo, lap: drawIndex });
            if (retired) {
              markSectorCrash(sectorIndex);
              addQualiCommentary(`S${sectorIndex + 1} — crash! Session over.`, 'crash');
              lapEvents.push('crash');
            } else {
              const isSlow = eventType === 'lockup' || eventType === 'spin';
              showSectorTime(sectorIndex, sectorTime, isSlow);
              if (eventType && QUALI_SECTOR_TEXT[eventType]) {
                addQualiCommentary(QUALI_SECTOR_TEXT[eventType][sectorIndex], eventType);
              }
              if (isSlow) lapEvents.push(eventType);
            }
          }
        );

        // rawResults at this point contains only previously completed drivers — use as reference
        const provisionalBest = rawResults.filter(r => !r.retired)
          .reduce((best, r) => (best === null || r.lapTime < best ? r.lapTime : best), null);
        showLapResult(result, provisionalBest, rawResults);

        rawResults.push({
          driverId:         car.driver.id,
          driverName:       car.driver.name,
          carNumber:        car.driver.number,
          teamId:           car.team.id,
          setup:            car.setup,
          lapTime:          result.lapTime,
          sectorTimes:      result.sectorTimes,
          retired:          result.retired,
          sectorsCompleted: result.sectorsCompleted,
          drawPosition:     drawIndex + 1,
        });

        updateProvisionalLeaderboard(rawResults);

        // Advance weather between drivers; announce significant state changes
        if (race.weatherScenario) {
          const prevState = race.weatherState;
          tickQualiWeather(rng, drawIndex + 1);
          if (race.weatherState !== prevState) {
            const weatherMessages = {
              DRIZZLE: 'Light rain beginning — conditions changing.',
              RAIN:    'Rain intensifying — track getting treacherous.',
              HEAVY:   'Heavy rain! Extremely difficult conditions.',
              DRY:     'Rain easing — track beginning to dry.',
            };
            addQualiCommentary(weatherMessages[race.weatherState] ?? 'Weather changing.', 'weather');
          }
        }

        await delay(sectorPause());
      }

      // Final sort (mirrors runQualifyingSession logic)
      const timed   = rawResults.filter(r => !r.retired).sort((a, b) => a.lapTime - b.lapTime);
      const retired = rawResults.filter(r => r.retired)
        .sort((a, b) =>
          b.sectorsCompleted - a.sectorsCompleted ||
          b.drawPosition     - a.drawPosition
        );
      const sorted = [...timed, ...retired];
      sorted.forEach((r, i) => { r.gridPosition = i + 1; });

      renderFinalLeaderboard(sorted);
      return sorted;
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function delay(ms) {
      if (ms <= 0) return Promise.resolve();
      return new Promise(resolve => {
        let elapsed = 0;
        const tick = () => {
          if (!paused) elapsed += 50;
          if (elapsed >= ms) { resolve(); return; }
          setTimeout(tick, 50);
        };
        setTimeout(tick, 50);
      });
    }

    function showOnTrack(car, drawIndex, total) {
      document.getElementById('current-driver-name').textContent =
        `${car.driver.number}. ${car.driver.name.toUpperCase()}`;
      document.getElementById('current-team-name').textContent =
        teamLabels[car.team.id] || car.team.shortName?.toUpperCase() || '';
      const teamColour = teamColours[car.team.id] || '#2a4055';
      document.getElementById('driver-colour-bar').style.background = teamColour;

      // Portrait
      const portraitEl = document.getElementById('driver-portrait');
      const pIdx = car.driver.portraitIndex;
      portraitEl.textContent = '';
      if (pIdx != null && pIdx < 32) {
        const COLS = 4, PX = 48;
        const sheet = Math.floor(pIdx / 16) + 1;
        const pos   = pIdx % 16;
        const col   = pos % COLS;
        const row   = Math.floor(pos / COLS);
        portraitEl.style.backgroundImage    = `url('driver_sprites_16x16_${sheet}.webp')`;
        portraitEl.style.backgroundSize     = `${PX * COLS}px ${PX * COLS}px`;
        portraitEl.style.backgroundPosition = `${-(col * PX)}px ${-(row * PX)}px`;
        portraitEl.style.backgroundColor    = `${teamColour}22`;
        portraitEl.style.color              = '';
      } else {
        portraitEl.textContent              = car.driver.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        portraitEl.style.backgroundImage    = '';
        portraitEl.style.backgroundSize     = '';
        portraitEl.style.backgroundPosition = '';
        portraitEl.style.backgroundColor    = `${teamColour}22`;
        portraitEl.style.color              = teamColour;
      }

      document.getElementById('draw-progress').textContent =
        `Car ${drawIndex + 1} of ${total}`;
      document.getElementById('lap-time-display').textContent = '–';
      document.getElementById('lap-time-display').className = '';
      const pv = document.getElementById('pos-value');
      pv.textContent = '–';
      pv.className   = 'pos-value';
    }

    function resetSectorCells() {
      for (let i = 1; i <= 3; i++) {
        document.getElementById(`st${i}`).textContent = '–';
        document.getElementById(`sg${i}`).textContent = '';
        document.getElementById(`sc${i}`).className   = 'sector-cell';
      }
    }

    function showSectorTime(index, time, isSlow) {
      const isFastest = !isSlow && (bestSectorTimes[index] === null || time < bestSectorTimes[index]);
      if (isFastest) bestSectorTimes[index] = time;

      const el   = document.getElementById(`st${index + 1}`);
      const gap  = document.getElementById(`sg${index + 1}`);
      const cell = document.getElementById(`sc${index + 1}`);

      el.textContent = time.toFixed(3);

      // Gap vs pole sitter's equivalent sector time
      if (!isSlow && poleSectorTimes && poleSectorTimes[index] != null) {
        const diff = time - poleSectorTimes[index];
        gap.textContent = diff < -0.001 ? `${diff.toFixed(3)}` : `+${diff.toFixed(3)}`;
      } else {
        gap.textContent = '';
      }

      if (isFastest) {
        cell.className = 'sector-cell done purple';
      } else if (isSlow) {
        cell.className = 'sector-cell done slow';
      } else {
        cell.className = 'sector-cell done';
      }
    }

    function markSectorCrash(index) {
      const el = document.getElementById(`st${index + 1}`);
      el.textContent = 'DNF';
      const cell = document.getElementById(`sc${index + 1}`);
      cell.className = 'sector-cell done slow';
      document.getElementById('lap-time-display').textContent = 'NO TIME';
      document.getElementById('lap-time-display').className = 'no-time';
    }

    function showLapResult(result, provisionalBest, previousResults) {
      const el     = document.getElementById('lap-time-display');
      const posVal = document.getElementById('pos-value');
      if (result.retired) {
        el.innerHTML   = '';
        el.textContent = 'NO TIME';
        el.className   = 'no-time';
        posVal.textContent = '–';
        posVal.className   = 'pos-value';
        return;
      }

      const isNewBest      = provisionalBest === null || result.lapTime < provisionalBest;
      const provisionalPos = previousResults.filter(r => !r.retired && r.lapTime < result.lapTime).length + 1;
      const timeColor      = isNewBest ? '#cc44ff' : 'var(--hi)';

      let gapHtml = '';
      if (provisionalBest !== null) {
        const diff   = result.lapTime - provisionalBest;
        const gapStr = diff <= 0 ? diff.toFixed(3) : `+${diff.toFixed(3)}`;
        const gapCol = diff <= 0 ? '#cc44ff' : 'var(--lo)';
        gapHtml = `<span style="font-size:12px;color:${gapCol}">${gapStr}</span>`;
      }

      el.innerHTML = `<span style="font-size:20px;color:${timeColor}">${formatTime(result.lapTime)}</span>${gapHtml}`;
      el.className = '';

      posVal.textContent = provisionalPos;
      posVal.className   = `pos-value${provisionalPos === 1 ? ' p1' : ''}`;
    }

    function clearOnTrackPanel() {
      document.getElementById('quali-commentary').innerHTML         = '';
      document.getElementById('current-driver-name').textContent    = 'SESSION COMPLETE';
      document.getElementById('current-team-name').textContent      = '';
      document.getElementById('driver-colour-bar').style.background = 'var(--dim)';
      document.getElementById('draw-progress').textContent          = '';
      document.getElementById('lap-time-display').textContent       = '–';
      const pv = document.getElementById('pos-value');
      pv.textContent = '–';
      pv.className   = 'pos-value';
      const portraitEl = document.getElementById('driver-portrait');
      portraitEl.textContent              = '🏁';
      portraitEl.style.backgroundImage    = '';
      portraitEl.style.backgroundSize     = '';
      portraitEl.style.backgroundPosition = '';
      portraitEl.style.backgroundColor    = 'transparent';
      portraitEl.style.color              = 'var(--hi)';
      portraitEl.style.fontSize           = '28px';
      portraitEl.style.lineHeight         = '46px';
      portraitEl.style.textAlign          = 'center';
      document.getElementById('quali-weather-strip').style.display = 'none';
      document.getElementById('run-order-section').style.display  = 'none';
    }

    function formatTime(seconds) {
      const m   = Math.floor(seconds / 60);
      const s   = seconds % 60;
      const sec = s.toFixed(3).padStart(6, '0');
      return `${m}:${sec}`;
    }

    function gapString(lapTime, bestTime) {
      if (lapTime == null) return '–';
      const diff = lapTime - bestTime;
      return diff < 0.001 ? '–' : `+${diff.toFixed(3)}`;
    }

    function updateProvisionalLeaderboard(rawResults) {
      const timed  = rawResults.filter(r => !r.retired).sort((a, b) => a.lapTime - b.lapTime);
      const noTime = rawResults.filter(r => r.retired);
      const sorted = [...timed, ...noTime];
      // Update pole sector times for the next driver's sector-gap comparison
      if (timed.length > 0 && timed[0].sectorTimes) {
        poleSectorTimes = timed[0].sectorTimes;
      }
      renderLeaderboard(sorted, false);
    }

    function renderFinalLeaderboard(results) {
      renderLeaderboard(results, true);
    }

    function renderLeaderboard(results, isFinal) {
      const tbody   = document.getElementById('quali-tbody');
      const bestTime = results.find(r => !r.retired)?.lapTime || null;
      tbody.innerHTML = '';

      results.forEach((r, i) => {
        const tr = document.createElement('tr');
        if (!isFinal && i === results.filter(x => !x.retired).length - 1 && !r.retired) {
          tr.className = 'on-track';
        }

        const pos = i + 1;

        // Resolve colour from TEAMS data — lazy import
        const colour = teamColours[r.teamId] || '#888';

        const teamLabel = teamLabels[r.teamId] || '';
        const driverHref = `driver.html?id=${r.driverId}&season=${event.season}`;
        const teamHref   = `team.html?id=${r.teamId}&season=${event.season}`;
        tr.innerHTML = `
          <td class="col-pos${pos === 1 ? ' p1' : ''}">${isFinal ? `P${pos}` : pos}</td>
          <td class="col-num">${r.carNumber ?? ''}</td>
          <td class="col-driver">
            <span class="team-dot-inline" style="background:${colour}"></span>
            <a href="${driverHref}" style="color:inherit;text-decoration:none">${r.driverName.toUpperCase()}</a>
          </td>
          <td class="col-team"><a href="${teamHref}" style="color:inherit;text-decoration:none">${teamLabel}</a></td>
          <td class="${r.retired ? 'col-no-time' : 'col-time'}">${r.retired ? 'NO TIME' : formatTime(r.lapTime)}</td>
          <td class="col-gap">${i === 0 || r.retired ? '' : gapString(r.lapTime, bestTime)}</td>
        `;
        tbody.appendChild(tr);
      });
    }


  </script>
