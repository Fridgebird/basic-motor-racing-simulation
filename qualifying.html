<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qualifying — Simple Motor Racing</title>
  <style>
    /* ── Fonts ─────────────────────────────────────────────────────────────── */
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-weight: normal;
      font-style: oblique;
    }

    /* ── Design tokens ──────────────────────────────────────────────────────── */
    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--mid);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    /* ── Topbar ─────────────────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 44px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
    }
    .b-flat {
      font-family: 'Square', monospace;
      font-size: 15px;
      font-weight: normal;
      color: var(--hi);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .b-flat em { font-style: normal; color: var(--mid); }

    .topbar-nav {
      display: flex;
      gap: 16px;
      margin-left: auto;
      margin-right: 16px;
    }
    .topbar-nav-link {
      color: var(--lo);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .topbar-nav-link:hover { color: var(--mid); }
    .topbar-nav-link.active { color: var(--mid); }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--lo);
    }

    /* ── Info bar ───────────────────────────────────────────────────────────── */
    #race-info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--lo);
      letter-spacing: 0.06em;
    }
    #circuit-name { color: var(--mid); }

    /* ── Main layout ────────────────────────────────────────────────────────── */
    #main {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      max-width: 900px;
    }

    /* ── On-track panel ─────────────────────────────────────────────────────── */
    #on-track-panel {
      width: 280px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 10px;
      color: var(--lo);
      letter-spacing: 0.10em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    #driver-info-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 10px;
      min-height: 34px;
    }
    #driver-colour-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--dim);
      flex-shrink: 0;
    }
    #current-driver-name {
      font-size: 14px;
      color: var(--hi);
      margin-bottom: 2px;
      min-height: 18px;
    }
    #current-team-name {
      font-size: 10px;
      color: var(--lo);
      min-height: 14px;
    }

    .seed-label { color: var(--dim); margin-right: 4px; }
    #seed-input {
      background: var(--bg-mid);
      color: var(--lo);
      border: 1px solid var(--border);
      font-family: 'Square', monospace;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 2px;
      width: 72px;
    }

    .sector-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 10px;
    }
    .sector-cell {
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 6px 4px;
      text-align: center;
    }
    .sector-cell .s-label { font-size: 9px; color: var(--lo); display: block; margin-bottom: 3px; letter-spacing: 0.08em; }
    .sector-cell .s-time  { font-size: 13px; color: var(--mid); display: block; }
    .sector-cell .s-gap   { font-size: 9px; color: var(--lo); display: block; margin-top: 2px; min-height: 11px; }
    .sector-cell.done     { border-color: var(--lo); }
    .sector-cell.done .s-time { color: var(--hi); }
    .sector-cell.slow .s-time { color: #e8c400; }
    .sector-cell.purple   { border-color: #cc44ff; }
    .sector-cell.purple .s-time { color: #cc44ff; }
    .sector-cell.purple .s-gap  { color: #cc44ff; }

    #lap-time-display {
      font-size: 20px;
      color: var(--hi);
      text-align: center;
      padding: 10px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 3px;
      margin-bottom: 6px;
      min-height: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    #lap-time-display.no-time { color: var(--lo); font-size: 13px; }
    #lap-time-display.purple  { color: #cc44ff; }

    #draw-progress {
      font-size: 10px;
      color: var(--lo);
      text-align: center;
      margin-bottom: 12px;
    }

    #btn-start-quali, #btn-replay-quali, #btn-rerun-quali, #btn-goto-race, #btn-pause-quali {
      width: 100%;
      padding: 8px;
      font-family: 'Square', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg-mid);
      color: var(--mid);
      margin-bottom: 6px;
    }
    #btn-start-quali:hover, #btn-replay-quali:hover, #btn-rerun-quali:hover, #btn-goto-race:hover, #btn-pause-quali:hover { border-color: var(--lo); color: var(--hi); }
    #btn-start-quali:disabled { opacity: 0.4; cursor: default; }
    #btn-goto-race    { display: none; border-color: var(--lo); }
    #btn-pause-quali  { display: none; }

    /* ── Leaderboard ────────────────────────────────────────────────────────── */
    #leaderboard-panel { flex: 1; min-width: 0; }

    #quali-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    #quali-table th {
      text-align: left;
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    #quali-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--dim);
      color: var(--mid);
    }
    #quali-table tr.on-track td { background: rgba(138,180,212,0.06); }
    #quali-table td.col-pos    { color: var(--lo); width: 28px; }
    #quali-table td.col-pos.p1 { color: var(--hi); }
    #quali-table td.col-driver { color: var(--hi); }
    #quali-table td.col-team   { color: var(--lo); font-size: 10px; }
    #quali-table td.col-time.purple { color: #cc44ff; }
    #quali-table td.col-no-time     { color: var(--lo); font-size: 10px; }
    #quali-table td.col-gap         { color: var(--lo); }
    .team-dot-inline {
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 1px;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Speed control ──────────────────────────────────────────────────────── */
    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 10px;
      color: var(--lo);
    }
    .control-row select {
      background: var(--bg-mid);
      color: var(--mid);
      border: 1px solid var(--border);
      font-family: 'Square', monospace;
      font-size: 10px;
      padding: 2px 4px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────────────────── -->
  <div id="topbar">
    <div class="b-flat">Simple <em>Motor Racing</em></div>
    <nav class="topbar-nav">
      <a href="index.html" class="topbar-nav-link">← CALENDAR</a>
    </nav>
    <div class="topbar-meta">
      <div id="topbar-status">QUALIFYING</div>
    </div>
  </div>

  <!-- ── Info bar ────────────────────────────────────────────────────────────── -->
  <div id="race-info-bar">
    <span id="circuit-name">–</span>
    <span>
      <span class="seed-label">SEED</span>
      <input type="number" id="seed-input" title="Override qualifying seed">
      &nbsp;&nbsp;
      <span id="session-status">–</span>
    </span>
  </div>

  <!-- ── Main ────────────────────────────────────────────────────────────────── -->
  <div id="main">

    <!-- On-track panel -->
    <div id="on-track-panel">
      <div class="panel-title">ON TRACK</div>

      <div id="driver-info-row">
        <div id="driver-colour-bar"></div>
        <div>
          <div id="current-driver-name"></div>
          <div id="current-team-name"></div>
        </div>
      </div>

      <div class="sector-grid">
        <div class="sector-cell" id="sc1">
          <span class="s-label">S1</span>
          <span class="s-time" id="st1">–</span>
          <span class="s-gap"  id="sg1"></span>
        </div>
        <div class="sector-cell" id="sc2">
          <span class="s-label">S2</span>
          <span class="s-time" id="st2">–</span>
          <span class="s-gap"  id="sg2"></span>
        </div>
        <div class="sector-cell" id="sc3">
          <span class="s-label">S3</span>
          <span class="s-time" id="st3">–</span>
          <span class="s-gap"  id="sg3"></span>
        </div>
      </div>

      <div id="lap-time-display">–</div>
      <div id="draw-progress"></div>

      <div class="control-row">
        <label>Speed</label>
        <select id="speed-select">
          <option value="200">Fast</option>
          <option value="2350">Normal</option>
          <option value="4500" selected>Slow</option>
          <option value="0">Instant</option>
        </select>
      </div>

      <button id="btn-start-quali">START QUALIFYING</button>
      <button id="btn-pause-quali">PAUSE</button>
      <button id="btn-goto-race">GO TO RACE →</button>
    </div>

    <!-- Leaderboard panel -->
    <div id="leaderboard-panel">
      <div class="panel-title">PROVISIONAL CLASSIFICATION</div>
      <table id="quali-table">
        <thead>
          <tr>
            <th>POS</th>
            <th>#</th>
            <th>DRIVER</th>
            <th>TEAM</th>
            <th>LAP TIME</th>
            <th>GAP</th>
          </tr>
        </thead>
        <tbody id="quali-tbody"></tbody>
      </table>
    </div>

  </div>

  <script type="module">
    import { initRace, cars }                        from './state.js';
    import { setCurrentCircuit, runQualifyingSession, simulateQualiLap, initStrategies, runRace } from './simulation.js';
    import {
      getCurrentEvent, getCircuit, getSeedForEvent, getEventForRound,
      saveQualiResults, loadQualiResults, resetWorld,
      advanceDevEvent, retreatDevEvent, isDevMode, enterDevMode, exitDevMode,
      getWorldSeed, setWorldSeed, getTodayDayOffset, getEventDate, formatShortDate,
      ensurePastResultsCached,
    } from './championship.js';
    import { getSeasonSnapshot } from './worldstate.js';

    // ── Dev mode entry via ?dev=1 ──────────────────────────────────────────────
    const params  = new URLSearchParams(location.search);
    if (params.get('dev') === '1') {
      enterDevMode();
      const cleanParams = new URLSearchParams();
      if (params.get('season')) cleanParams.set('season', params.get('season'));
      if (params.get('round'))  cleanParams.set('round',  params.get('round'));
      const qs = cleanParams.toString();
      history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
    }

    // ── Championship context ───────────────────────────────────────────────────
    const pSeason = params.get('season');
    const pRound  = params.get('round');

    const event = (pSeason && pRound)
      ? getEventForRound(parseInt(pSeason, 10), parseInt(pRound, 10), 'qualifying')
      : getCurrentEvent();

    const circuit   = getCircuit(event);
    const worldSeed = getWorldSeed();
    const seed      = getSeedForEvent(event, worldSeed);
    setCurrentCircuit(circuit);
    const simFns = { initRace, cars, runRace, initStrategies, setCurrentCircuit, runQualifyingSession, getSeasonSnapshot };
    if (event.season > 1) await ensurePastResultsCached(event.season - 1, simFns);
    const snapshot  = getSeasonSnapshot(event.season, worldSeed);

    // Info bar
    document.getElementById('circuit-name').textContent =
      `S${event.season} R${event.round} · ${circuit.eventName} — Qualifying · ${circuit.name}, ${circuit.country}`;

    // ── Dev bar ────────────────────────────────────────────────────────────────
    if (isDevMode()) {
      const todayOff     = getTodayDayOffset();
      const todayDateStr = formatShortDate(getEventDate(todayOff));
      const devBar = document.createElement('div');
      devBar.style.cssText = 'width:100%;max-width:1100px;padding:4px 8px;font-size:11px;color:#4a6a88;background:#080c12;border:1px solid #1e2f44;border-top:none;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
      devBar.innerHTML = `
        <button id="db-prev" style="padding:2px 8px">◀ PREV</button>
        <span>DEV · Day ${todayOff} · ${todayDateStr} · R${event.round} Qualifying — ${circuit.eventName}</span>
        <button id="db-next" style="padding:2px 8px">NEXT ▶</button>
        <span style="color:#2a4055">KEY:</span>
        <input id="db-seed" type="number" value="${worldSeed}" style="width:80px;background:#080c12;color:#8ab4d4;border:1px solid #1e2f44;font-family:inherit;font-size:11px;padding:2px 4px;">
        <button id="db-reset" style="padding:2px 8px;color:#cc2233;border-color:#cc2233">RESET WORLD</button>
        <button id="db-exit" style="padding:2px 8px;color:#cc2233;border-color:#cc2233">EXIT DEV</button>
      `;
      document.getElementById('topbar').insertAdjacentElement('afterend', devBar);
      devBar.querySelector('#db-prev').addEventListener('click', () => { retreatDevEvent(); location.reload(); });
      devBar.querySelector('#db-next').addEventListener('click', () => { advanceDevEvent(); location.reload(); });
      devBar.querySelector('#db-seed').addEventListener('change', e => { setWorldSeed(parseInt(e.target.value, 10) || 0); location.reload(); });
      devBar.querySelector('#db-reset').addEventListener('click', () => {
        if (confirm('Clear all race and qualifying results? This cannot be undone.')) {
          resetWorld(); location.reload();
        }
      });
      devBar.querySelector('#db-exit').addEventListener('click', () => { exitDevMode(); location.href = 'index.html'; });
    }

    // ── State ──────────────────────────────────────────────────────────────────
    let qualiResults    = null;
    let sessionDone     = false;
    let bestSectorTimes = [null, null, null];  // fastest sector time per sector across all drivers
    let poleSectorTimes = null;                // sector times of current provisional P1
    let paused          = false;

    const speedSel    = document.getElementById('speed-select');
    const btnStart    = document.getElementById('btn-start-quali');
    const btnPause    = document.getElementById('btn-pause-quali');
    const btnGotoRace = document.getElementById('btn-goto-race');
    const seedInput   = document.getElementById('seed-input');

    // Team colours and labels — must be declared before cached-results check.
    // Populated async; re-render leaderboard once data arrives so dots aren't grey.
    const teamColours = {};
    const teamLabels  = {};  // teamId → "MCLAREN-HONDA"
    import('./data.js').then(({ TEAMS }) => {
      TEAMS.forEach(t => {
        teamColours[t.id] = t.colour;
        const tName = t.name.toUpperCase();
        const eName = t.engine ? t.engine.toUpperCase() : '';
        teamLabels[t.id] = (tName === eName || !eName) ? tName : `${tName}-${eName}`;
      });
    });

    // Seed: default to championship-derived seed; user can override before session starts
    let activeSeed = seed;
    seedInput.value = seed;
    seedInput.addEventListener('change', () => {
      if (!sessionDone && !btnStart.disabled) {
        activeSeed = parseInt(seedInput.value, 10) || seed;
        seedInput.value = activeSeed;
      }
    });

    // ── Check for cached results ───────────────────────────────────────────────
    // If results exist, silently store them so clicking Start replays the animation
    // with the same seed (same result). The result table is available on the calendar page.
    const cached = loadQualiResults(event.season, event.round);
    if (cached) {
      qualiResults = cached;
    }

    // ── Start qualifying ───────────────────────────────────────────────────────
    btnStart.addEventListener('click', async () => {
      btnStart.disabled        = true;
      seedInput.disabled       = true;
      btnPause.style.display   = 'block';
      bestSectorTimes = [null, null, null];
      poleSectorTimes = null;
      document.getElementById('session-status').textContent = 'SESSION RUNNING';

      // Init cars — rolls setups (qualifying seed)
      const rng = initRace(activeSeed, null, circuit, snapshot);

      // Run session with animation
      qualiResults = await runQualifyingSessionAnimated(rng, circuit);

      // Persist (guard: don't overwrite a silently-computed result — they'd be identical)
      if (!loadQualiResults(event.season, event.round)) {
        saveQualiResults(event.season, event.round, qualiResults);
      }

      sessionDone              = true;
      paused                   = false;
      btnPause.style.display   = 'none';
      document.getElementById('session-status').textContent = 'SESSION COMPLETE';
      btnGotoRace.style.display = 'block';
      clearOnTrackPanel();
    });

    btnGotoRace.addEventListener('click', () => {
      window.location.href = `race.html?season=${event.season}&round=${event.round}`;
    });

    btnPause.addEventListener('click', () => {
      paused = !paused;
      btnPause.textContent = paused ? 'RESUME' : 'PAUSE';
      if (paused) {
        document.getElementById('session-status').textContent = 'PAUSED';
      } else {
        document.getElementById('session-status').textContent = 'SESSION RUNNING';
      }
    });

    // ── Animated qualifying session ────────────────────────────────────────────
    // Uses simulateQualiLap's onSector callback for sector-by-sector animation.
    async function runQualifyingSessionAnimated(rng, circuit) {
      const { cars } = await import('./state.js');

      // Fisher-Yates shuffle (same algorithm as runQualifyingSession — must match)
      const drawOrder = [...cars];
      for (let i = drawOrder.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [drawOrder[i], drawOrder[j]] = [drawOrder[j], drawOrder[i]];
      }

      const rawResults = [];
      const sectorPause = () => parseInt(speedSel.value, 10) / 3;

      for (let drawIndex = 0; drawIndex < drawOrder.length; drawIndex++) {
        const car            = drawOrder[drawIndex];
        const trackEvolution = drawOrder.length > 1 ? drawIndex / (drawOrder.length - 1) : 0;

        showOnTrack(car, drawIndex, drawOrder.length);
        resetSectorCells();

        // simulateQualiLap calls onSector after each sector — we show it then wait
        const result = await simulateQualiLap(car, rng, circuit, trackEvolution,
          async (sectorIndex, sectorTime, isSlow, retired) => {
            await delay(sectorPause());
            if (retired) {
              markSectorCrash(sectorIndex);
            } else {
              showSectorTime(sectorIndex, sectorTime, isSlow);
            }
          }
        );

        // rawResults at this point contains only previously completed drivers — use as reference
        const provisionalBest = rawResults.filter(r => !r.retired)
          .reduce((best, r) => (best === null || r.lapTime < best ? r.lapTime : best), null);
        showLapResult(result, provisionalBest, rawResults);
        await delay(sectorPause() * 2);

        rawResults.push({
          driverId:         car.driver.id,
          driverName:       car.driver.name,
          carNumber:        car.driver.number,
          teamId:           car.team.id,
          setup:            car.setup,
          lapTime:          result.lapTime,
          sectorTimes:      result.sectorTimes,
          retired:          result.retired,
          sectorsCompleted: result.sectorsCompleted,
          drawPosition:     drawIndex + 1,
        });

        updateProvisionalLeaderboard(rawResults);
        await delay(sectorPause());
      }

      // Final sort (mirrors runQualifyingSession logic)
      const timed   = rawResults.filter(r => !r.retired).sort((a, b) => a.lapTime - b.lapTime);
      const retired = rawResults.filter(r => r.retired)
        .sort((a, b) =>
          b.sectorsCompleted - a.sectorsCompleted ||
          b.drawPosition     - a.drawPosition
        );
      const sorted = [...timed, ...retired];
      sorted.forEach((r, i) => { r.gridPosition = i + 1; });

      renderFinalLeaderboard(sorted);
      return sorted;
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function delay(ms) {
      if (ms <= 0) return Promise.resolve();
      return new Promise(resolve => {
        let elapsed = 0;
        const tick = () => {
          if (!paused) elapsed += 50;
          if (elapsed >= ms) { resolve(); return; }
          setTimeout(tick, 50);
        };
        setTimeout(tick, 50);
      });
    }

    function showOnTrack(car, drawIndex, total) {
      document.getElementById('current-driver-name').textContent = `${car.driver.number}. ${car.driver.name.toUpperCase()}`;
      const teamName   = car.team.name.toUpperCase();
      const engineName = car.team.engine ? car.team.engine.toUpperCase() : '';
      const teamLabel  = teamName === engineName || !engineName
        ? teamName : `${teamName}-${engineName}`;
      document.getElementById('current-team-name').textContent = teamLabel;
      document.getElementById('driver-colour-bar').style.background =
        teamColours[car.team.id] || 'var(--dim)';
      document.getElementById('draw-progress').textContent =
        `Car ${drawIndex + 1} of ${total}`;
      document.getElementById('lap-time-display').textContent = '–';
      document.getElementById('lap-time-display').className = '';
    }

    function resetSectorCells() {
      for (let i = 1; i <= 3; i++) {
        document.getElementById(`st${i}`).textContent = '–';
        document.getElementById(`sg${i}`).textContent = '';
        document.getElementById(`sc${i}`).className   = 'sector-cell';
      }
    }

    function showSectorTime(index, time, isSlow) {
      const isFastest = !isSlow && (bestSectorTimes[index] === null || time < bestSectorTimes[index]);
      if (isFastest) bestSectorTimes[index] = time;

      const el   = document.getElementById(`st${index + 1}`);
      const gap  = document.getElementById(`sg${index + 1}`);
      const cell = document.getElementById(`sc${index + 1}`);

      el.textContent = time.toFixed(3);

      // Gap vs pole sitter's equivalent sector time
      if (!isSlow && poleSectorTimes && poleSectorTimes[index] != null) {
        const diff = time - poleSectorTimes[index];
        gap.textContent = diff < -0.001 ? `${diff.toFixed(3)}` : `+${diff.toFixed(3)}`;
      } else {
        gap.textContent = '';
      }

      if (isFastest) {
        cell.className = 'sector-cell done purple';
      } else if (isSlow) {
        cell.className = 'sector-cell done slow';
      } else {
        cell.className = 'sector-cell done';
      }
    }

    function markSectorCrash(index) {
      const el = document.getElementById(`st${index + 1}`);
      el.textContent = 'DNF';
      const cell = document.getElementById(`sc${index + 1}`);
      cell.className = 'sector-cell done slow';
      document.getElementById('lap-time-display').textContent = 'NO TIME';
      document.getElementById('lap-time-display').className = 'no-time';
    }

    function showLapResult(result, provisionalBest, previousResults) {
      const el = document.getElementById('lap-time-display');
      if (result.retired) {
        el.innerHTML = '';
        el.textContent = 'NO TIME';
        el.className   = 'no-time';
        return;
      }

      const isNewBest      = provisionalBest === null || result.lapTime < provisionalBest;
      const provisionalPos = previousResults.filter(r => !r.retired && r.lapTime < result.lapTime).length + 1;
      const timeColor      = isNewBest ? '#cc44ff' : 'var(--hi)';

      let gapHtml = '';
      if (provisionalBest !== null) {
        const diff   = result.lapTime - provisionalBest;
        const gapStr = diff <= 0 ? diff.toFixed(3) : `+${diff.toFixed(3)}`;
        const gapCol = diff <= 0 ? '#cc44ff' : 'var(--lo)';
        gapHtml = `<span style="font-size:12px;color:${gapCol}">${gapStr}</span>`;
      }

      const posCol  = provisionalPos === 1 ? 'var(--hi)' : 'var(--lo)';
      const posHtml = `<span style="font-size:12px;color:${posCol}">P${provisionalPos}</span>`;

      el.innerHTML  = `<span style="font-size:20px;color:${timeColor}">${formatTime(result.lapTime)}</span>${gapHtml}${posHtml}`;
      el.className  = '';
    }

    function clearOnTrackPanel() {
      document.getElementById('current-driver-name').textContent  = 'SESSION COMPLETE';
      document.getElementById('current-team-name').textContent    = '';
      document.getElementById('driver-colour-bar').style.background = 'var(--dim)';
      document.getElementById('draw-progress').textContent         = '';
      document.getElementById('lap-time-display').textContent      = '–';
    }

    function formatTime(seconds) {
      const m   = Math.floor(seconds / 60);
      const s   = seconds % 60;
      const sec = s.toFixed(3).padStart(6, '0');
      return `${m}:${sec}`;
    }

    function gapString(lapTime, bestTime) {
      if (lapTime == null) return '–';
      const diff = lapTime - bestTime;
      return diff < 0.001 ? '–' : `+${diff.toFixed(3)}`;
    }

    function updateProvisionalLeaderboard(rawResults) {
      const timed  = rawResults.filter(r => !r.retired).sort((a, b) => a.lapTime - b.lapTime);
      const noTime = rawResults.filter(r => r.retired);
      const sorted = [...timed, ...noTime];
      // Update pole sector times for the next driver's sector-gap comparison
      if (timed.length > 0 && timed[0].sectorTimes) {
        poleSectorTimes = timed[0].sectorTimes;
      }
      renderLeaderboard(sorted, false);
    }

    function renderFinalLeaderboard(results) {
      renderLeaderboard(results, true);
    }

    function renderLeaderboard(results, isFinal) {
      const tbody   = document.getElementById('quali-tbody');
      const bestTime = results.find(r => !r.retired)?.lapTime || null;
      tbody.innerHTML = '';

      results.forEach((r, i) => {
        const tr = document.createElement('tr');
        if (!isFinal && i === results.filter(x => !x.retired).length - 1 && !r.retired) {
          tr.className = 'on-track';
        }

        const pos = i + 1;

        // Resolve colour from TEAMS data — lazy import
        const colour = teamColours[r.teamId] || '#888';

        const teamLabel = teamLabels[r.teamId] || '';
        tr.innerHTML = `
          <td class="col-pos${pos === 1 ? ' p1' : ''}">${isFinal ? `P${pos}` : pos}</td>
          <td class="col-num">${r.carNumber ?? ''}</td>
          <td class="col-driver">
            <span class="team-dot-inline" style="background:${colour}"></span>
            ${r.driverName.toUpperCase()}
          </td>
          <td class="col-team">${teamLabel}</td>
          <td class="${r.retired ? 'col-no-time' : 'col-time'}">${r.retired ? 'NO TIME' : formatTime(r.lapTime)}</td>
          <td class="col-gap">${i === 0 || r.retired ? '' : gapString(r.lapTime, bestTime)}</td>
        `;
        tbody.appendChild(tr);
      });
    }


  </script>
</body>
</html>
