<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Simple Motor Racing</title>
  <style>
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-weight: normal;
      font-style: oblique;
    }

    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--mid);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    #topbar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 44px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
    }
    .b-flat { font-size: 15px; font-weight: normal; color: var(--hi); letter-spacing: 0.04em; flex-shrink: 0; }
    .b-flat em { font-style: normal; color: var(--mid); }
    .topbar-nav { display: flex; gap: 16px; margin-left: auto; margin-right: 16px; }
    .topbar-nav-link { color: var(--lo); text-decoration: none; font-size: 10px; letter-spacing: 0.08em; }
    .topbar-nav-link:hover { color: var(--mid); }

    #info-bar {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--lo);
      letter-spacing: 0.06em;
    }
    #event-label { color: var(--mid); }

    #loading-msg {
      padding: 32px 16px;
      color: var(--lo);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    #main {
      padding: 16px 16px;
      max-width: 760px;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 20px;
    }
    .results-table th {
      text-align: left;
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    .results-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--dim);
      color: var(--mid);
    }
    .col-pos        { color: var(--lo); width: 32px; }
    .col-pos.p1     { color: var(--hi); }
    .col-pos.dnf    { color: var(--dim); font-size: 10px; }
    .col-name       { color: var(--hi); }
    .col-team       { color: var(--lo); }
    .col-gap        { font-variant-numeric: tabular-nums; }
    .col-gap.leader { color: var(--lo); }
    .col-stops      { width: 48px; text-align: center; color: var(--lo); }
    .col-status     { width: 60px; }
    .col-time       { font-variant-numeric: tabular-nums; }
    .col-time.pole  { color: var(--hi); }

    .status-mech  { color: var(--accent); font-size: 9px; letter-spacing: 0.06em; }
    .status-crash { color: var(--accent); font-size: 9px; letter-spacing: 0.06em; }

    .team-dot {
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 1px;
      margin-right: 5px;
      vertical-align: middle;
    }

    .no-time { color: var(--dim); font-size: 10px; }

    .results-footer {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 4px 0 12px;
    }
    .footer-btn {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--lo);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .footer-btn:hover   { color: var(--mid); border-color: var(--mid); }
    .footer-btn.primary { color: var(--mid); border-color: var(--lo); }
    .footer-btn.primary:hover { color: var(--hi); border-color: var(--mid); }
  </style>
</head>
<body>

  <div id="topbar">
    <div class="b-flat">Simple <em>Motor Racing</em></div>
    <nav class="topbar-nav">
      <a href="index.html"     class="topbar-nav-link">← CALENDAR</a>
      <a href="standings.html" class="topbar-nav-link">STANDINGS</a>
    </nav>
  </div>

  <div id="info-bar">
    <span id="event-label">–</span>
  </div>

  <div id="loading-msg">Computing results…</div>
  <div id="main" style="display:none">
    <div id="results-container"></div>
    <div class="results-footer" id="results-footer"></div>
  </div>

  <script type="module">
    import {
      getCircuit, getEventForRound, ensurePastResultsCached,
      hasRaceResult, loadQualiResults, getStandings,
    } from './championship.js';
    import { TEAMS } from './data.js';

    const params  = new URLSearchParams(location.search);
    const season  = parseInt(params.get('season'), 10) || 1;
    const round   = parseInt(params.get('round'),  10) || 1;
    const type    = params.get('type') === 'qualifying' ? 'qualifying' : 'race';

    const event   = getEventForRound(season, round, type);
    if (!event) {
      document.getElementById('loading-msg').textContent = 'Event not found.';
      return;
    }
    const circuit = getCircuit(event);

    const typeLabel = type === 'qualifying' ? 'Qualifying Result' : 'Race Result';
    document.getElementById('event-label').textContent =
      `S${season} R${round} · ${circuit.eventName} — ${typeLabel}`;
    document.title = `${circuit.eventName} ${typeLabel} — Simple Motor Racing`;

    const teamColours = Object.fromEntries(TEAMS.map(t => [t.id, t.colour]));
    const teamNames   = Object.fromEntries(TEAMS.map(t => [t.id, t.name]));

    // Engine name lookup (for display only)
    const engByTeam = {};
    TEAMS.forEach(t => { engByTeam[t.id] = t.engine; });
    const engineNames = { honda:'Honda', ferrari:'Ferrari', megatron:'Megatron', ford:'Ford' };

    function teamDisplay(teamId) {
      const base = (teamNames[teamId] || teamId).toUpperCase();
      const eng  = engineNames[engByTeam[teamId]];
      if (!eng) return base;
      // Deduplicate Ferrari-Ferrari
      const engUp = eng.toUpperCase();
      return base.includes(engUp) ? base : `${base}-${engUp}`;
    }

    // ── Compute any missing past results ──────────────────────────────────────
    await ensurePastResultsCached(season);

    document.getElementById('loading-msg').style.display = 'none';
    document.getElementById('main').style.display = 'block';

    const container = document.getElementById('results-container');
    const footer    = document.getElementById('results-footer');

    // ── Render ─────────────────────────────────────────────────────────────────
    if (type === 'qualifying') {
      renderQuali();
    } else {
      renderRace();
    }

    // ── Footer ──────────────────────────────────────────────────────────────────
    const backA = Object.assign(document.createElement('a'), {
      href: 'index.html', className: 'footer-btn', textContent: '← CALENDAR',
    });
    const watchLabel = type === 'qualifying' ? 'WATCH QUALIFYING →' : 'WATCH RACE →';
    const watchHref  = type === 'qualifying'
      ? `qualifying.html?season=${season}&round=${round}`
      : `race.html?season=${season}&round=${round}`;
    const watchA = Object.assign(document.createElement('a'), {
      href: watchHref, className: 'footer-btn primary', textContent: watchLabel,
    });
    footer.append(backA, watchA);

    // ── Race result table ──────────────────────────────────────────────────────
    function renderRace() {
      if (!hasRaceResult(season, round)) {
        container.innerHTML = '<p style="color:var(--lo);font-size:11px;padding:20px 0">No result available yet.</p>';
        return;
      }

      const { races } = getStandings(season);
      const entries   = races[round];
      if (!entries) return;

      const table = document.createElement('table');
      table.className = 'results-table';
      table.innerHTML = `<thead><tr>
        <th>POS</th><th>DRIVER</th><th>TEAM</th><th>GAP</th><th>STOPS</th><th>STATUS</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');

      entries.forEach(e => {
        const colour = teamColours[e.teamId] || '#888';
        const pos    = e.retired ? 'R' : e.position;
        const pCls   = e.retired ? 'col-pos dnf' : (e.position === 1 ? 'col-pos p1' : 'col-pos');

        let gapStr = '';
        if (!e.retired) {
          gapStr = e.position === 1 ? '—' : (e.gap != null ? `+${e.gap.toFixed(3)}` : '');
        } else {
          gapStr = e.lapsCompleted != null ? `DNF L${e.lapsCompleted}` : 'DNF';
        }

        const stops = e.stops != null ? e.stops : '–';
        let statusHtml = '';
        if (e.retired) {
          const cls = e.dnfReason === 'crash' ? 'status-crash' : 'status-mech';
          const lbl = e.dnfReason === 'crash' ? 'CRASH' : 'MECH';
          statusHtml = `<span class="${cls}">${lbl}</span>`;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="${pCls}">${pos}</td>
          <td class="col-name"><span class="team-dot" style="background:${colour}"></span>${e.driverName.toUpperCase()}</td>
          <td class="col-team">${teamDisplay(e.teamId)}</td>
          <td class="col-gap${e.position === 1 && !e.retired ? ' leader' : ''}">${gapStr}</td>
          <td class="col-stops">${stops}</td>
          <td class="col-status">${statusHtml}</td>
        `;
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      container.appendChild(table);
    }

    // ── Qualifying result table ────────────────────────────────────────────────
    function renderQuali() {
      const results = loadQualiResults(season, round);
      if (!results) {
        container.innerHTML = '<p style="color:var(--lo);font-size:11px;padding:20px 0">No result available yet.</p>';
        return;
      }

      const table = document.createElement('table');
      table.className = 'results-table';
      table.innerHTML = `<thead><tr>
        <th>POS</th><th>DRIVER</th><th>TEAM</th><th>LAP TIME</th><th>GAP</th>
      </tr></thead>`;
      const tbody = document.createElement('tbody');

      // Sort by gridPosition, retired at the back
      const sorted = [...results].sort((a, b) => {
        if (a.retired && !b.retired) return 1;
        if (!a.retired && b.retired) return -1;
        return (a.gridPosition || 99) - (b.gridPosition || 99);
      });

      const poleEntry = sorted.find(r => !r.retired && r.lapTime);
      const poleTime  = poleEntry ? poleEntry.lapTime : null;

      sorted.forEach(r => {
        const colour = teamColours[r.teamId] || '#888';
        const pos    = r.retired ? '—' : r.gridPosition;
        const pCls   = r.retired ? 'col-pos dnf' : (r.gridPosition === 1 ? 'col-pos p1' : 'col-pos');

        let timeHtml = '<span class="no-time">NO TIME</span>';
        let gapStr   = '';
        if (!r.retired && r.lapTime) {
          const m   = Math.floor(r.lapTime / 60);
          const s   = (r.lapTime % 60).toFixed(3).padStart(6, '0');
          timeHtml  = `${m}:${s}`;
          gapStr    = r.gridPosition === 1 ? '—' : (poleTime ? `+${(r.lapTime - poleTime).toFixed(3)}` : '');
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="${pCls}">${pos}</td>
          <td class="col-name"><span class="team-dot" style="background:${colour}"></span>${r.driverName.toUpperCase()}</td>
          <td class="col-team">${teamDisplay(r.teamId)}</td>
          <td class="col-time${r.gridPosition === 1 && !r.retired ? ' pole' : ''}">${timeHtml}</td>
          <td class="col-gap${r.gridPosition === 1 ? ' leader' : ''}">${gapStr}</td>
        `;
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      container.appendChild(table);
    }
  </script>

</body>
</html>
