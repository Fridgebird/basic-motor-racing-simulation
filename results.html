<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — Simple Motor Racing</title>
  <style>
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-weight: normal;
      font-style: oblique;
    }

    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--mid);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    #topbar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 44px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
    }
    .b-flat { font-size: 15px; font-weight: normal; color: var(--hi); letter-spacing: 0.04em; flex-shrink: 0; }
    .b-flat em { font-style: normal; color: var(--mid); }
    .topbar-nav { display: flex; gap: 16px; margin-left: auto; margin-right: 16px; }
    .topbar-nav-link { color: var(--lo); text-decoration: none; font-size: 10px; letter-spacing: 0.08em; }
    .topbar-nav-link:hover { color: var(--mid); }

    #info-bar {
      display: flex;
      align-items: center;
      padding: 6px 16px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--lo);
      letter-spacing: 0.06em;
    }
    #event-label { color: var(--mid); }

    #loading-msg {
      padding: 32px 16px;
      color: var(--lo);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    #main {
      padding: 16px 16px;
      max-width: 900px;
      display: flex;
      gap: 32px;
      align-items: flex-start;
    }

    #result-col  { flex: 1; min-width: 0; }
    #champ-col   { width: 260px; flex-shrink: 0; }

    @media (max-width: 600px) {
      #main      { flex-direction: column; gap: 20px; padding: 12px 8px; }
      #champ-col { width: 100%; }
    }

    .panel-title {
      font-size: 9px;
      color: var(--lo);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 10px;
    }

    /* ── Result table ── */
    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .results-table th {
      text-align: left;
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    .results-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--dim);
      color: var(--mid);
    }
    .col-pos        { color: var(--lo); width: 28px; }
    .col-pos.p1     { color: var(--hi); }
    .col-pos.dnf    { color: var(--dim); font-size: 10px; }
    .col-name       { color: var(--hi); }
    .col-team       { color: var(--lo); }
    .col-gap        { font-variant-numeric: tabular-nums; }
    .col-gap.leader { color: var(--lo); }
    .col-stops      { width: 36px; text-align: center; color: var(--lo); }
    .col-pts        { width: 36px; text-align: right; color: var(--hi); }
    .col-status     { width: 56px; }
    .col-time       { font-variant-numeric: tabular-nums; }
    .col-time.pole  { color: var(--hi); }

    .status-mech  { color: var(--accent); font-size: 9px; letter-spacing: 0.06em; }
    .status-crash { color: var(--accent); font-size: 9px; letter-spacing: 0.06em; }

    .team-dot {
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 1px;
      margin-right: 5px;
      vertical-align: middle;
    }

    .no-time { color: var(--dim); font-size: 10px; }

    /* ── Championship standings panel ── */
    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-bottom: 16px;
    }
    .standings-table th {
      text-align: left;
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 3px 4px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    .standings-table td {
      padding: 3px 4px;
      border-bottom: 1px solid var(--dim);
      color: var(--mid);
      font-size: 10px;
    }
    .standings-table td.s-pos    { color: var(--lo); width: 22px; }
    .standings-table td.s-pos.p1 { color: var(--hi); }
    .standings-table td.s-name   { color: var(--hi); }
    .standings-table td.s-pts    { color: var(--hi); text-align: right; }
    .standings-table td.s-w      { color: var(--lo); text-align: right; width: 24px; }
    .s-team { font-size: 9px; color: var(--lo); letter-spacing: 0.04em; margin-top: 1px; }

    /* ── Champion banner ── */
    .champion-banner {
      margin-top: 20px;
      padding: 12px 4px;
      border-top: 1px solid var(--mid);
      text-align: center;
    }
    .champion-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--lo);
      text-transform: uppercase;
    }
    .champion-name {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--accent);
      margin-top: 4px;
    }

    /* ── Footer ── */
    .results-footer {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 4px 0 12px;
    }
    .footer-btn {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--lo);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .footer-btn:hover   { color: var(--mid); border-color: var(--mid); }
    .footer-btn.primary { color: var(--mid); border-color: var(--lo); }
    .footer-btn.primary:hover { color: var(--hi); border-color: var(--mid); }
  </style>
</head>
<body>

  <div id="topbar">
    <div class="b-flat">Simple <em>Motor Racing</em></div>
    <nav class="topbar-nav">
      <a href="index.html" class="topbar-nav-link">← CALENDAR</a>
    </nav>
  </div>

  <div id="info-bar">
    <span id="event-label">–</span>
  </div>

  <div id="loading-msg">Computing results…</div>
  <div id="main" style="display:none">
    <div id="result-col">
      <div id="results-container"></div>
      <div class="results-footer" id="results-footer"></div>
    </div>
    <div id="champ-col" style="display:none">
      <div id="champ-panel"></div>
    </div>
  </div>

  <script type="module">
    import {
      getCircuit, getEventForRound, ensurePastResultsCached,
      hasRaceResult, loadQualiResults, getStandings, getStandingsThroughRound,
      getTodayDayOffset,
    } from './championship.js';
    import { TEAMS, SEASON_SCHEDULE } from './data.js';
    import { initRace, cars } from './state.js';
    import { runRace, initStrategies, setCurrentCircuit, runQualifyingSession } from './simulation.js';

    (async () => {
      const params  = new URLSearchParams(location.search);
      const season  = parseInt(params.get('season'), 10) || 1;
      const round   = parseInt(params.get('round'),  10) || 1;
      const type    = params.get('type') === 'qualifying' ? 'qualifying' : 'race';

      const event = getEventForRound(season, round, type);
      if (!event) {
        document.getElementById('loading-msg').textContent = 'Event not found.';
        return;
      }
      const circuit = getCircuit(event);

      const typeLabel = type === 'qualifying' ? 'Qualifying Result' : 'Race Result';
      document.getElementById('event-label').textContent =
        `S${season} R${round} · ${circuit.eventName} — ${typeLabel}`;
      document.title = `${circuit.eventName} ${typeLabel} — Simple Motor Racing`;

      const simFns = { initRace, cars, runRace, initStrategies, setCurrentCircuit, runQualifyingSession };
      await ensurePastResultsCached(season, simFns);

      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('main').style.display        = 'flex';

      const container = document.getElementById('results-container');
      const footer    = document.getElementById('results-footer');

      const teamColours = Object.fromEntries(TEAMS.map(t => [t.id, t.colour]));
      const teamNames   = Object.fromEntries(TEAMS.map(t => [t.id, t.name]));
      const engByTeam   = Object.fromEntries(TEAMS.map(t => [t.id, t.engine]));
      const engineNames = { honda: 'Honda', ferrari: 'Ferrari', megatron: 'Megatron', ford: 'Ford' };
      const POINTS_TABLE = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];

      function displayTeam(teamId) {
        const base = (teamNames[teamId] || teamId).toUpperCase();
        const eng  = engineNames[engByTeam[teamId]];
        if (!eng) return base;
        const engUp = eng.toUpperCase();
        return base.includes(engUp) ? base : `${base}-${engUp}`;
      }

      function formatGap(secs) {
        if (secs < 60) return `+${secs.toFixed(3)}`;
        const m = Math.floor(secs / 60);
        const s = (secs % 60).toFixed(3).padStart(6, '0');
        return `+${m}:${s}`;
      }

      // ── Render result ────────────────────────────────────────────────────────
      if (type === 'qualifying') {
        renderQuali(container, teamColours, displayTeam);
      } else {
        renderRace(container, teamColours, displayTeam);
        renderChampionship(season, round, teamColours, teamNames);
      }

      // ── Footer ───────────────────────────────────────────────────────────────
      const totalRounds = Math.max(...SEASON_SCHEDULE.map(e => e.round));
      const todayOffset = getTodayDayOffset();

      function roundDayOffset(r) {
        const ev = getEventForRound(season, r, type);
        return ev ? ev.dayOffset : Infinity;
      }

      function navBtn(r) {
        if (r < 1 || r > totalRounds) return null;
        if (roundDayOffset(r) > todayOffset) return null; // future — no result yet
        const isToday = roundDayOffset(r) === todayOffset;
        const href    = `results.html?season=${season}&round=${r}&type=${type}`;
        const btn     = document.createElement('a');
        btn.className = 'footer-btn';
        if (isToday) {
          btn.href = '#';
          btn.addEventListener('click', e => {
            e.preventDefault();
            if (confirm('Show today\'s result? This contains spoilers.')) location.href = href;
          });
        } else {
          btn.href = href;
        }
        return btn;
      }

      const prevBtn = navBtn(round - 1);
      const nextBtn = navBtn(round + 1);
      if (prevBtn) { prevBtn.textContent = `← R${round - 1}`; footer.appendChild(prevBtn); }

      const backA = Object.assign(document.createElement('a'), {
        href: 'index.html', className: 'footer-btn', textContent: '← CALENDAR',
      });
      const watchLabel = type === 'qualifying' ? 'WATCH QUALIFYING →' : 'WATCH RACE →';
      const watchHref  = type === 'qualifying'
        ? `qualifying.html?season=${season}&round=${round}`
        : `race.html?season=${season}&round=${round}`;
      const watchA = Object.assign(document.createElement('a'), {
        href: watchHref, className: 'footer-btn primary', textContent: watchLabel,
      });
      footer.append(backA, watchA);
      if (nextBtn) { nextBtn.textContent = `R${round + 1} →`; footer.appendChild(nextBtn); }

      // ── Race result table ────────────────────────────────────────────────────
      function renderRace(el, colours, displayTeam) {
        if (!hasRaceResult(season, round)) {
          el.innerHTML = '<p style="color:var(--lo);font-size:11px;padding:20px 0">No result available yet.</p>';
          return;
        }

        const { races } = getStandings(season);
        const entries   = races[round];
        if (!entries) {
          el.innerHTML = '<p style="color:var(--lo);font-size:11px;padding:20px 0">No result available yet.</p>';
          return;
        }

        const table = buildTable(['POS', 'DRIVER', 'TEAM', 'GAP', 'PIT', 'STATUS', 'PTS']);
        const tbody = table.querySelector('tbody');

        entries.forEach((e, i) => {
          const colour = colours[e.teamId] || '#888';
          const pos    = e.retired ? 'R' : e.position;
          const pCls   = e.retired ? 'dnf' : (e.position === 1 ? 'p1' : '');

          let gapStr = '';
          if (!e.retired) {
            gapStr = e.position === 1 ? '—' : (e.gap != null ? formatGap(e.gap) : '');
          } else {
            gapStr = e.lapsCompleted != null ? `DNF L${e.lapsCompleted}` : 'DNF';
          }

          const stops = e.stops != null ? e.stops : '–';
          const pts   = !e.retired ? (POINTS_TABLE[i] ?? '') : '';
          let statusHtml = '';
          if (e.retired) {
            const cls = e.dnfReason === 'crash' ? 'status-crash' : 'status-mech';
            const lbl = e.dnfReason === 'crash' ? 'CRASH' : 'MECH';
            statusHtml = `<span class="${cls}">${lbl}</span>`;
          }

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="col-pos ${pCls}">${pos}</td>
            <td class="col-name"><span class="team-dot" style="background:${colour}"></span>${e.driverName.toUpperCase()}</td>
            <td class="col-team">${displayTeam(e.teamId)}</td>
            <td class="col-gap${e.position === 1 && !e.retired ? ' leader' : ''}">${gapStr}</td>
            <td class="col-stops">${stops}</td>
            <td class="col-status">${statusHtml}</td>
            <td class="col-pts">${pts}</td>
          `;
          tbody.appendChild(tr);
        });

        el.appendChild(table);
      }

      // ── Qualifying result table ──────────────────────────────────────────────
      function renderQuali(el, colours, displayTeam) {
        const results = loadQualiResults(season, round);
        if (!results) {
          el.innerHTML = '<p style="color:var(--lo);font-size:11px;padding:20px 0">No result available yet.</p>';
          return;
        }

        const table = buildTable(['POS', 'DRIVER', 'TEAM', 'LAP TIME', 'GAP']);
        const tbody = table.querySelector('tbody');

        const sorted = [...results].sort((a, b) => {
          if (a.retired && !b.retired) return 1;
          if (!a.retired && b.retired) return -1;
          return (a.gridPosition || 99) - (b.gridPosition || 99);
        });

        const poleEntry = sorted.find(r => !r.retired && r.lapTime);
        const poleTime  = poleEntry ? poleEntry.lapTime : null;

        sorted.forEach(r => {
          const colour   = colours[r.teamId] || '#888';
          const pos      = r.retired ? '—' : r.gridPosition;
          const pCls     = r.retired ? 'dnf' : (r.gridPosition === 1 ? 'p1' : '');
          let timeHtml   = '<span class="no-time">NO TIME</span>';
          let gapStr     = '';
          if (!r.retired && r.lapTime) {
            const m  = Math.floor(r.lapTime / 60);
            const s  = (r.lapTime % 60).toFixed(3).padStart(6, '0');
            timeHtml = `${m}:${s}`;
            gapStr   = r.gridPosition === 1 ? '—' : (poleTime ? `+${(r.lapTime - poleTime).toFixed(3)}` : '');
          }
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="col-pos ${pCls}">${pos}</td>
            <td class="col-name"><span class="team-dot" style="background:${colour}"></span>${r.driverName.toUpperCase()}</td>
            <td class="col-team">${displayTeam(r.teamId)}</td>
            <td class="col-time${r.gridPosition === 1 && !r.retired ? ' pole' : ''}">${timeHtml}</td>
            <td class="col-gap${r.gridPosition === 1 ? ' leader' : ''}">${gapStr}</td>
          `;
          tbody.appendChild(tr);
        });

        el.appendChild(table);
      }

      // ── Championship panel ───────────────────────────────────────────────────
      function renderChampionship(season, round, colours, names) {
        const { drivers, constructors } = getStandingsThroughRound(season, round);
        if (!drivers.length) return;

        const panel = document.getElementById('champ-panel');
        document.getElementById('champ-col').style.display = 'block';

        // Drivers
        const dTitle = document.createElement('div');
        dTitle.className = 'panel-title';
        dTitle.textContent = `Drivers · After R${round}`;
        panel.appendChild(dTitle);

        const dTable = buildStandingsTable(['POS', 'DRIVER', 'PTS', 'W']);
        const dTbody = dTable.querySelector('tbody');
        drivers.forEach((d, i) => {
          const colour = colours[d.teamId] || '#888';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="s-pos${i === 0 ? ' p1' : ''}">${i + 1}</td>
            <td class="s-name">
              <span class="team-dot" style="background:${colour}"></span>${d.name.toUpperCase()}
              <div class="s-team">${displayTeam(d.teamId)}</div>
            </td>
            <td class="s-pts">${d.points}</td>
            <td class="s-w">${d.wins}</td>
          `;
          dTbody.appendChild(tr);
        });
        panel.appendChild(dTable);

        // Constructors
        if (constructors.length) {
          const cTitle = document.createElement('div');
          cTitle.className = 'panel-title';
          cTitle.textContent = 'Constructors';
          panel.appendChild(cTitle);

          const cTable = buildStandingsTable(['POS', 'TEAM', 'PTS', 'W']);
          const cTbody = cTable.querySelector('tbody');
          constructors.forEach((c, i) => {
            const colour = colours[c.id] || '#888';
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="s-pos${i === 0 ? ' p1' : ''}">${i + 1}</td>
              <td class="s-name"><span class="team-dot" style="background:${colour}"></span>${displayTeam(c.id)}</td>
              <td class="s-pts">${c.points}</td>
              <td class="s-w">${c.wins}</td>
            `;
            cTbody.appendChild(tr);
          });
          panel.appendChild(cTable);
        }

        // Champion declaration — shown only on the final round result
        const lastRound = Math.max(...SEASON_SCHEDULE.map(e => e.round));
        if (round === lastRound && drivers.length && constructors.length) {
          const banner = document.createElement('div');
          banner.className = 'champion-banner';
          banner.innerHTML = `
            <div class="champion-label">Season ${season} · Drivers' World Champion</div>
            <div class="champion-name">${drivers[0].name.toUpperCase()}</div>
            <div class="champion-label" style="margin-top:12px">Season ${season} · Constructors' Champion</div>
            <div class="champion-name">${displayTeam(constructors[0].id)}</div>
          `;
          panel.appendChild(banner);
        }
      }

      // ── Table helpers ────────────────────────────────────────────────────────
      function buildTable(headers) {
        const table = document.createElement('table');
        table.className = 'results-table';
        const thead = document.createElement('thead');
        thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
        table.appendChild(thead);
        table.appendChild(document.createElement('tbody'));
        return table;
      }

      function buildStandingsTable(headers) {
        const table = document.createElement('table');
        table.className = 'standings-table';
        const thead = document.createElement('thead');
        thead.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
        table.appendChild(thead);
        table.appendChild(document.createElement('tbody'));
        return table;
      }
    })();
  </script>

</body>
</html>
