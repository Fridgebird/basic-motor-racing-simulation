<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings — Simple Motor Racing</title>
  <style>
    @font-face {
      font-family: 'Square';
      src: url('Square.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Square';
      src: url('Squareo.ttf') format('truetype');
      font-weight: normal;
      font-style: oblique;
    }

    :root {
      --bg:      #0d1117;
      --bg-deep: #080c12;
      --bg-mid:  #0a0f18;
      --border:  #1e2f44;
      --hi:      #ffffff;
      --mid:     #8ab4d4;
      --lo:      #4a6a88;
      --dim:     #2a4055;
      --accent:  #cc2233;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--mid);
      font-family: 'Square', 'Courier New', monospace;
      font-size: 12px;
      min-height: 100vh;
    }

    #topbar {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 44px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-bottom: 2px solid var(--accent);
    }
    .b-flat { font-family: 'Square', monospace; font-size: 15px; font-weight: normal; color: var(--hi); letter-spacing: 0.04em; flex-shrink: 0; }
    .b-flat em { font-style: normal; color: var(--mid); }

    .topbar-nav { display: flex; gap: 16px; margin-left: auto; margin-right: 16px; }
    .topbar-nav-link { color: var(--lo); text-decoration: none; font-size: 10px; letter-spacing: 0.08em; }
    .topbar-nav-link:hover { color: var(--mid); }
    .topbar-nav-link.active { color: var(--mid); }

    .topbar-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 0.06em; color: var(--lo); }

    #race-info-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--lo);
      letter-spacing: 0.06em;
    }
    #circuit-name { color: var(--mid); }

    #main {
      padding: 12px 16px;
      display: flex;
      gap: 24px;
      max-width: 900px;
    }

    .standings-section { flex: 1; min-width: 0; }

    .panel-title {
      font-size: 10px;
      color: var(--lo);
      letter-spacing: 0.10em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    .standings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .standings-table th {
      text-align: left;
      color: var(--lo);
      font-size: 9px;
      letter-spacing: 0.10em;
      padding: 3px 6px;
      border-bottom: 1px solid var(--border);
      font-weight: normal;
    }
    .standings-table td {
      padding: 4px 6px;
      border-bottom: 1px solid var(--dim);
      color: var(--mid);
    }
    .standings-table td.col-pos    { color: var(--lo); width: 28px; }
    .standings-table td.col-pos.p1 { color: var(--hi); }
    .standings-table td.col-name   { color: var(--hi); }
    .standings-table td.col-pts    { color: var(--hi); font-size: 13px; }
    .standings-table td.col-wins   { color: var(--lo); }
    .team-dot-inline {
      display: inline-block;
      width: 3px;
      height: 12px;
      border-radius: 1px;
      margin-right: 5px;
      vertical-align: middle;
    }

    #no-data {
      color: var(--lo);
      font-size: 11px;
      padding: 20px 0;
    }
  </style>
</head>
<body>

  <div id="topbar">
    <div class="b-flat">Simple <em>Motor Racing</em></div>
    <nav class="topbar-nav">
      <a href="index.html"     class="topbar-nav-link">← CALENDAR</a>
      <a href="standings.html" class="topbar-nav-link active">STANDINGS</a>
    </nav>
    <div class="topbar-meta">
      <div id="topbar-status">STANDINGS</div>
    </div>
  </div>

  <div id="race-info-bar">
    <span id="circuit-name">–</span>
  </div>

  <div id="main">

    <div class="standings-section">
      <div class="panel-title">DRIVERS CHAMPIONSHIP</div>
      <div id="drivers-content"><div id="no-data">No race results yet this season.</div></div>
    </div>

    <div class="standings-section">
      <div class="panel-title">CONSTRUCTORS CHAMPIONSHIP</div>
      <div id="constructors-content"></div>
    </div>

  </div>

  <script type="module">
    import {
      getCurrentEvent, getStandings, getCircuit,
      isDevMode, enterDevMode, exitDevMode, resetWorld,
      advanceDevEvent, retreatDevEvent,
      getWorldSeed, setWorldSeed, getTodayDayOffset, getEventDate, formatShortDate,
    } from './championship.js';
    import { TEAMS } from './data.js';

    // ── Dev mode entry via ?dev=1 ──────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    if (params.get('dev') === '1') {
      enterDevMode();
      history.replaceState(null, '', location.pathname);
    }

    const event   = getCurrentEvent();
    const circuit = getCircuit(event);

    // ── Dev bar ────────────────────────────────────────────────────────────────
    if (isDevMode()) {
      const todayOff     = getTodayDayOffset();
      const todayDateStr = formatShortDate(getEventDate(todayOff));
      const worldSeed    = getWorldSeed();
      const devBar = document.createElement('div');
      devBar.style.cssText = 'width:100%;max-width:900px;padding:4px 8px;font-size:11px;color:#4a6a88;background:#080c12;border:1px solid #1e2f44;border-top:none;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
      devBar.innerHTML = `
        <button id="db-prev" style="padding:2px 8px">◀ PREV</button>
        <span>DEV · Day ${todayOff} · ${todayDateStr} · S${event.season} — Standings</span>
        <button id="db-next" style="padding:2px 8px">NEXT ▶</button>
        <span style="color:#2a4055">KEY:</span>
        <input id="db-seed" type="number" value="${worldSeed}" style="width:80px;background:#080c12;color:#8ab4d4;border:1px solid #1e2f44;font-family:inherit;font-size:11px;padding:2px 4px;">
        <button id="db-reset" style="padding:2px 8px;color:#cc2233;border-color:#cc2233">RESET WORLD</button>
        <button id="db-exit" style="padding:2px 8px;color:#cc2233;border-color:#cc2233">EXIT DEV</button>
      `;
      document.getElementById('topbar').insertAdjacentElement('afterend', devBar);
      devBar.querySelector('#db-prev').addEventListener('click', () => { retreatDevEvent(); location.reload(); });
      devBar.querySelector('#db-next').addEventListener('click', () => { advanceDevEvent(); location.reload(); });
      devBar.querySelector('#db-seed').addEventListener('change', e => { setWorldSeed(parseInt(e.target.value, 10) || 0); location.reload(); });
      devBar.querySelector('#db-reset').addEventListener('click', () => {
        if (confirm('Clear all race and qualifying results? This cannot be undone.')) {
          resetWorld(); location.reload();
        }
      });
      devBar.querySelector('#db-exit').addEventListener('click', () => { exitDevMode(); location.href = 'index.html'; });
    }

    document.getElementById('circuit-name').textContent =
      `S${event.season} · ${circuit.eventName} — Season ${event.season} Standings`;

    const standings = getStandings(event.season);

    // Build team colour lookup
    const teamColours = Object.fromEntries(TEAMS.map(t => [t.id, t.colour]));
    const teamNames   = Object.fromEntries(TEAMS.map(t => [t.id, t.name]));

    // ── Drivers ─────────────────────────────────────────────────────────────
    if (standings.drivers.length === 0) {
      // No-data message already in DOM
    } else {
      const table = document.createElement('table');
      table.className = 'standings-table';
      table.innerHTML = `
        <thead><tr>
          <th>POS</th><th>DRIVER</th><th>TEAM</th><th>PTS</th><th>W</th><th>POD</th>
        </tr></thead>
      `;
      const tbody = document.createElement('tbody');
      standings.drivers.forEach((d, i) => {
        const colour = teamColours[d.teamId] || '#888';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="col-pos${i === 0 ? ' p1' : ''}">${i + 1}</td>
          <td class="col-name">
            <span class="team-dot-inline" style="background:${colour}"></span>
            ${d.name.toUpperCase()}
          </td>
          <td>${(teamNames[d.teamId] || d.teamId).toUpperCase()}</td>
          <td class="col-pts">${d.points}</td>
          <td class="col-wins">${d.wins}</td>
          <td class="col-wins">${d.podiums}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      const container = document.getElementById('drivers-content');
      container.innerHTML = '';
      container.appendChild(table);
    }

    // ── Constructors ─────────────────────────────────────────────────────────
    if (standings.constructors.length > 0) {
      const table = document.createElement('table');
      table.className = 'standings-table';
      table.innerHTML = `
        <thead><tr>
          <th>POS</th><th>TEAM</th><th>PTS</th><th>W</th>
        </tr></thead>
      `;
      const tbody = document.createElement('tbody');
      standings.constructors.forEach((c, i) => {
        const colour = teamColours[c.id] || '#888';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="col-pos${i === 0 ? ' p1' : ''}">${i + 1}</td>
          <td class="col-name">
            <span class="team-dot-inline" style="background:${colour}"></span>
            ${(teamNames[c.id] || c.id).toUpperCase()}
          </td>
          <td class="col-pts">${c.points}</td>
          <td class="col-wins">${c.wins}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      document.getElementById('constructors-content').appendChild(table);
    }
  </script>
</body>
</html>
