<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings — Simple Motor Racing</title>
  <style>
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-weight:normal; }
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-weight:bold; }
    :root {
      --bg:#0d1117; --bg-deep:#080c12; --bg-mid:#0a0f18; --border:#1e2f44;
      --hi:#ffffff; --mid:#8ab4d4; --lo:#4a6a88; --dim:#2a4055; --accent:#cc2233;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--mid); font-family:'Square','Courier New',monospace; font-size:12px; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

    #topbar { width:100%; height:44px; background:var(--bg-deep); border:1px solid var(--border); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 16px; }
    .b-flat { font-size:15px; color:var(--hi); letter-spacing:0.04em; flex-shrink:0; }
    .b-flat em { font-style:normal; color:var(--mid); }
    .topbar-nav { display:flex; gap:16px; margin-left:auto; margin-right:16px; }
    .topbar-nav-link { color:var(--lo); text-decoration:none; font-size:10px; letter-spacing:0.08em; }
    .topbar-nav-link:hover { color:var(--mid); }
    .topbar-nav-link.current { color:var(--mid); }

    #info-bar { width:100%; background:var(--bg-mid); border-bottom:1px solid var(--border); padding:6px 16px; font-size:9px; letter-spacing:2px; color:var(--lo); text-transform:uppercase; }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    #loading-state { padding:48px 16px; font-size:9px; letter-spacing:3px; color:var(--lo); text-align:center; width:100%; animation:pulse 1.6s ease-in-out infinite; }

    #page { width:100%; max-width:860px; padding:24px 16px; }

    #season-nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    #as-of-label { font-size:8px; letter-spacing:2px; color:var(--lo); text-align:center; padding:0 0 16px; }
    .nav-btn { font-family:inherit; font-size:9px; letter-spacing:1px; color:var(--lo); background:none; border:1px solid var(--border); padding:5px 12px; cursor:pointer; text-transform:uppercase; }
    .nav-btn:hover:not(:disabled) { color:var(--hi); border-color:var(--mid); }
    .nav-btn:disabled { opacity:0.25; cursor:default; }
    #season-label { font-size:11px; letter-spacing:2px; color:var(--hi); }

    #standings-wrap { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media (max-width:600px) { #standings-wrap { grid-template-columns:1fr; } }

    .table-section { border:1px solid var(--border); }
    .table-header { padding:6px 12px; font-size:9px; letter-spacing:2px; color:var(--lo); border-bottom:1px solid var(--border); background:var(--bg-deep); }
    .standings-table { width:100%; border-collapse:collapse; }
    .standings-table th { font-size:9px; letter-spacing:1px; color:var(--lo); text-align:left; padding:5px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
    .standings-table td { padding:5px 10px; font-size:11px; color:var(--mid); border-bottom:1px solid var(--dim); }
    .standings-table tr:last-child td { border-bottom:none; }
    .standings-table tr:hover td { background:var(--bg-mid); }
    .standings-table a { color:inherit; text-decoration:none; }
    .standings-table a:hover { color:var(--hi); }
    .col-pos  { color:var(--hi); width:32px; }
    .col-pos.p1 { color:var(--accent); }
    .col-pts  { color:var(--hi); text-align:right; }
    .col-w    { color:var(--lo); text-align:right; }
    .col-team { color:var(--lo); font-size:10px; }
    .team-dot { display:inline-block; width:3px; height:14px; vertical-align:middle; margin-right:6px; border-radius:1px; flex-shrink:0; }
    .no-data  { padding:20px; font-size:9px; letter-spacing:2px; color:var(--dim); text-align:center; }

    /* ── Season results grid ── */
    .rg-section { margin-top:28px; }
    .rg-title { font-size:9px; letter-spacing:2px; color:var(--lo); text-transform:uppercase; border-bottom:1px solid var(--border); padding-bottom:4px; }
    .rg-scroll { overflow-x:auto; border:1px solid var(--border); border-top:none; }
    .rg-table { border-collapse:collapse; white-space:nowrap; }
    .rg-table th { font-size:8px; letter-spacing:0.5px; color:var(--lo); padding:4px 2px; text-align:center; border-bottom:1px solid var(--border); font-weight:normal; min-width:22px; width:22px; }
    .rg-driver-th { text-align:left !important; padding:4px 8px !important; min-width:48px !important; width:48px !important; position:sticky; left:0; background:var(--bg); z-index:2; border-right:1px solid var(--border); }
    .rg-table td { text-align:center; padding:3px 2px; border-bottom:1px solid var(--dim); color:var(--lo); min-width:22px; width:22px; font-size:10px; }
    .rg-driver-td { text-align:left !important; padding:3px 8px !important; position:sticky; left:0; background:var(--bg); z-index:1; border-right:1px solid var(--border); color:var(--mid); font-size:10px; }
    .rg-win { background:rgba(180,140,0,0.18); color:#d4a800 !important; }
    .rg-ret { color:var(--dim) !important; }
  </style>
</head>
<body>

  <div id="topbar">
    <span class="b-flat">Simple <em>Motor Racing</em></span>
    <nav class="topbar-nav">
      <a href="index.html" class="topbar-nav-link">HOME</a>
      <a href="calendar.html" class="topbar-nav-link">CALENDAR</a>
      <a href="drivers.html" class="topbar-nav-link">DRIVERS</a>
      <a href="team.html" class="topbar-nav-link">TEAMS</a>
      <a href="standings.html" class="topbar-nav-link current">STANDINGS</a>
    </nav>
  </div>
  <div id="info-bar">Championship Standings</div>

  <div id="loading-state">COMPUTING HISTORY…</div>

  <div id="page" style="display:none">
    <div id="season-nav">
      <button class="nav-btn" id="btn-prev">◀ PREV</button>
      <span id="season-label">—</span>
      <button class="nav-btn" id="btn-next">NEXT ▶</button>
    </div>
    <div id="as-of-label"></div>
    <div id="standings-wrap">
      <div class="table-section">
        <div class="table-header">DRIVERS' CHAMPIONSHIP</div>
        <table class="standings-table">
          <thead><tr>
            <th class="col-pos">POS</th>
            <th>DRIVER</th>
            <th>TEAM</th>
            <th style="text-align:right">W</th>
            <th style="text-align:right">PTS</th>
          </tr></thead>
          <tbody id="drivers-tbody"></tbody>
        </table>
      </div>
      <div class="table-section">
        <div class="table-header">CONSTRUCTORS' CHAMPIONSHIP</div>
        <table class="standings-table">
          <thead><tr>
            <th class="col-pos">POS</th>
            <th>TEAM</th>
            <th style="text-align:right">W</th>
            <th style="text-align:right">PTS</th>
          </tr></thead>
          <tbody id="constructors-tbody"></tbody>
        </table>
      </div>
    </div>
    <div id="round-summary"></div>
  </div>

  <script type="module">
    import { TEAMS, ENGINES, CIRCUITS, SEASON_SCHEDULE } from './data.js';
    import { getDisplayYear, getSeasonSnapshot, getTeamEngine } from './worldstate.js';
    import {
      getCurrentEvent, getWorldSeed, getStandings, getStandingsThroughRound,
      ensurePastResultsCached, getLastCompletedRace, formatAsOfLabel,
    }                          from './championship.js';
    import { initRace, cars }  from './state.js';
    import {
      runRace, initStrategies, initWeather, setCurrentCircuit, runQualifyingSession,
    }                          from './simulation.js';

    const worldSeed     = getWorldSeed();
    const currentEvent  = getCurrentEvent();
    const currentSeason = currentEvent.season;

    const simFns = {
      initRace, cars, runRace, initStrategies, initWeather,
      setCurrentCircuit, runQualifyingSession, getSeasonSnapshot,
    };

    const params = new URLSearchParams(location.search);
    let viewedSeason = parseInt(params.get('season') || currentSeason, 10);
    viewedSeason = Math.max(1, Math.min(viewedSeason, currentSeason));

    let lastCompleted = null; // set after ensurePastResultsCached completes

    function teamLabel(teamId, season) {
      const team = TEAMS.find(t => t.id === teamId);
      if (!team) return (teamId || '').toUpperCase();
      const engineId   = getTeamEngine(teamId, season, worldSeed);
      const engineName = (ENGINES[engineId]?.name ?? '').toUpperCase();
      const shortUp    = team.shortName.toUpperCase();
      return (!engineName || shortUp === engineName) ? shortUp : `${shortUp}-${engineName}`;
    }

    function renderStandings(season) {
      const year = getDisplayYear(season);
      document.getElementById('season-label').textContent = `${year}`;
      document.getElementById('info-bar').textContent = `Championship Standings · ${year}`;
      document.getElementById('btn-prev').disabled = season <= 1;
      document.getElementById('btn-next').disabled = season >= currentSeason;

      const asOfEl = document.getElementById('as-of-label');
      let drivers, constructors, upToRound;
      if (season === currentSeason && lastCompleted) {
        const cutoffRound = lastCompleted.season === currentSeason ? lastCompleted.round : 0;
        ({ drivers, constructors } = getStandingsThroughRound(season, cutoffRound));
        asOfEl.textContent = formatAsOfLabel(lastCompleted);
        upToRound = cutoffRound;
      } else {
        ({ drivers, constructors } = getStandings(season));
        asOfEl.textContent = '';
        upToRound = Infinity;
      }

      const driversTbody = document.getElementById('drivers-tbody');
      driversTbody.innerHTML = '';
      if (!drivers.length) {
        driversTbody.innerHTML = '<tr><td colspan="5" class="no-data">NO DATA YET</td></tr>';
      } else {
        drivers.forEach((d, i) => {
          const pos   = i + 1;
          const team  = TEAMS.find(t => t.id === d.teamId);
          const dot   = team ? `<span class="team-dot" style="background:${team.colour}"></span>` : '';
          const label = teamLabel(d.teamId, season);
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="col-pos${pos === 1 ? ' p1' : ''}">${pos}</td>
            <td>${d.driverId != null
              ? `<a href="driver.html?id=${d.driverId}&season=${season}">${d.name.toUpperCase()}</a>`
              : d.name.toUpperCase()
            }</td>
            <td class="col-team">${dot}${team
              ? `<a href="team.html?id=${team.id}&season=${season}">${label}</a>`
              : label
            }</td>
            <td class="col-w">${d.wins}</td>
            <td class="col-pts">${d.points}</td>
          `;
          driversTbody.appendChild(tr);
        });
      }

      const ctorTbody = document.getElementById('constructors-tbody');
      ctorTbody.innerHTML = '';
      if (!constructors.length) {
        ctorTbody.innerHTML = '<tr><td colspan="4" class="no-data">NO DATA YET</td></tr>';
      } else {
        constructors.forEach((c, i) => {
          const pos   = i + 1;
          const team  = TEAMS.find(t => t.id === c.id);
          const dot   = team ? `<span class="team-dot" style="background:${team.colour}"></span>` : '';
          const label = teamLabel(c.id, season);
          const name  = team
            ? `<a href="team.html?id=${team.id}&season=${season}">${dot}${label}</a>`
            : c.id.toUpperCase();
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="col-pos${pos === 1 ? ' p1' : ''}">${pos}</td>
            <td>${name}</td>
            <td class="col-w">${c.wins}</td>
            <td class="col-pts">${c.points}</td>
          `;
          ctorTbody.appendChild(tr);
        });
      }

      const summaryEl = document.getElementById('round-summary');
      summaryEl.innerHTML = '';
      renderRoundSummary(summaryEl, season, upToRound, drivers);

      window.history.replaceState(null, '', `standings.html?season=${season}`);
    }

    document.getElementById('btn-prev').addEventListener('click', () => {
      viewedSeason = Math.max(1, viewedSeason - 1);
      renderStandings(viewedSeason);
    });
    document.getElementById('btn-next').addEventListener('click', () => {
      viewedSeason = Math.min(currentSeason, viewedSeason + 1);
      renderStandings(viewedSeason);
    });

    (async () => {
      for (let s = 1; s <= currentSeason; s++) {
        await ensurePastResultsCached(s, simFns);
      }
      lastCompleted = getLastCompletedRace();
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('page').style.display = '';
      renderStandings(viewedSeason);
    })();

    function renderRoundSummary(container, season, upToRound, orderedDrivers) {
      const { races } = getStandings(season);
      const drivers = orderedDrivers || [];
      if (!drivers.length) return;

      const teamColours = Object.fromEntries(TEAMS.map(t => [t.id, t.colour]));

      const rounds = SEASON_SCHEDULE
        .filter(e => e.eventType === 'race' && races[e.round] && e.round <= upToRound)
        .sort((a, b) => a.round - b.round);
      if (!rounds.length) return;

      // driverName → round → { position, retired }
      const resultMap = {};
      for (const { round: r } of rounds) {
        for (const entry of races[r]) {
          if (!resultMap[entry.driverName]) resultMap[entry.driverName] = {};
          resultMap[entry.driverName][r] = { position: entry.position, retired: entry.retired };
        }
      }

      const section = document.createElement('div');
      section.className = 'rg-section';
      const title = document.createElement('div');
      title.className = 'rg-title';
      title.textContent = 'SEASON RESULTS';
      section.appendChild(title);

      const scroll = document.createElement('div');
      scroll.className = 'rg-scroll';
      const table = document.createElement('table');
      table.className = 'rg-table';

      const thead = document.createElement('thead');
      const hr = document.createElement('tr');
      const th0 = document.createElement('th');
      th0.className = 'rg-driver-th';
      hr.appendChild(th0);
      for (const { round: r, circuitId } of rounds) {
        const th = document.createElement('th');
        th.textContent = CIRCUITS[circuitId].abbrev;
        th.title = `R${r} · ${CIRCUITS[circuitId].eventName}`;
        hr.appendChild(th);
      }
      thead.appendChild(hr);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      for (const driver of drivers) {
        const tr = document.createElement('tr');
        const td0 = document.createElement('td');
        td0.className = 'rg-driver-td';
        const colour = teamColours[driver.teamId] || '#888';
        const surname = driver.name.split(' ').pop().slice(0, 3).toUpperCase();
        td0.innerHTML = `<span class="team-dot" style="background:${colour};height:10px"></span> ${surname}`;
        tr.appendChild(td0);

        for (const { round: r } of rounds) {
          const res = (resultMap[driver.name] || {})[r];
          const td = document.createElement('td');
          if (!res) {
            td.textContent = '–';
          } else if (res.retired) {
            td.textContent = 'R';
            td.classList.add('rg-ret');
          } else {
            td.textContent = res.position;
            if (res.position === 1) td.classList.add('rg-win');
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      scroll.appendChild(table);
      section.appendChild(scroll);
      container.appendChild(section);
    }
  </script>
</body>
</html>
