<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constructor Profile — Simple Motor Racing</title>
  <style>
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-weight:normal; }
    @font-face { font-family:'Square'; src:url('Square.ttf') format('truetype'); font-weight:bold; }
    :root {
      --bg:#0d1117; --bg-deep:#080c12; --bg-mid:#0a0f18; --border:#1e2f44;
      --hi:#ffffff; --mid:#8ab4d4; --lo:#4a6a88; --dim:#2a4055; --accent:#cc2233;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--mid); font-family:'Square','Courier New',monospace; font-size:12px; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

    #topbar { width:100%; height:44px; background:var(--bg-deep); border:1px solid var(--border); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 16px; }
    .b-flat { font-size:15px; color:var(--hi); letter-spacing:0.04em; flex-shrink:0; }
    .b-flat em { font-style:normal; color:var(--mid); }
    .topbar-nav { display:flex; gap:16px; margin-left:auto; margin-right:16px; }
    .topbar-nav-link { color:var(--lo); text-decoration:none; font-size:10px; letter-spacing:0.08em; }
    .topbar-nav-link:hover { color:var(--mid); }
    .topbar-nav-link.current { color:var(--mid); }

    #info-bar { width:100%; background:var(--bg-mid); border-bottom:1px solid var(--border); padding:6px 16px; font-size:9px; letter-spacing:2px; color:var(--lo); text-transform:uppercase; }

    #sticky-header { position:sticky; top:0; z-index:100; width:100%; background:var(--bg); display:flex; flex-direction:column; align-items:center; box-shadow:0 3px 12px rgba(0,0,0,0.6); }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    #loading-state { padding:48px 16px; font-size:9px; letter-spacing:3px; color:var(--mid); text-align:center; width:100%; animation:pulse 1.6s ease-in-out infinite; }
    #as-of-label { font-size:8px; letter-spacing:2px; color:var(--lo); text-align:right; padding:0 0 12px; }

    #page { width:100%; max-width:760px; padding:16px 16px 24px; }

    #team-nav { display:flex; justify-content:space-between; align-items:center; width:100%; max-width:760px; padding:10px 16px; }
    .nav-btn { font-family:inherit; font-size:9px; letter-spacing:1px; color:var(--lo); background:none; border:1px solid var(--border); padding:5px 12px; cursor:pointer; text-transform:uppercase; }
    .nav-btn:hover:not(:disabled) { color:var(--hi); border-color:var(--mid); }
    .nav-btn:disabled { opacity:0.25; cursor:default; }
    #team-counter { font-size:9px; letter-spacing:2px; color:var(--lo); }

    #profile-card { border:1px solid var(--border); background:var(--bg-mid); margin-bottom:20px; overflow:hidden; }

    #car-wrap { width:100%; display:flex; aspect-ratio:25/9; background:#111418; border-bottom:1px solid var(--border); overflow:hidden; }
    #car-sprite { flex:16; overflow:hidden; }
    #team-logo { flex:9; background:var(--bg-mid); border-left:1px solid var(--border); display:flex; align-items:center; justify-content:center; padding:16px; overflow:hidden; }
    .car-img { width:100%; height:100%; object-fit:cover; display:block; }
    .car-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:9px; letter-spacing:3px; }
    .logo-img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .logo-placeholder { font-size:8px; letter-spacing:2px; text-align:center; }

    #team-header { display:flex; align-items:center; padding:16px 20px 12px; border-bottom:1px solid var(--border); }
    #livery-bar { width:4px; align-self:stretch; flex-shrink:0; margin-right:16px; border-radius:1px; }
    #team-meta { font-size:9px; letter-spacing:2px; color:var(--lo); }

    #career-stats { display:flex; gap:24px; flex-wrap:wrap; padding:16px 20px; border-bottom:1px solid var(--border); }
    .stat-block { display:flex; flex-direction:column; gap:3px; }
    .stat-value { font-size:18px; color:var(--hi); letter-spacing:1px; }
    .stat-label { font-size:8px; letter-spacing:2px; color:var(--lo); text-transform:uppercase; }

    #season-pane { padding:16px 20px; }
    #season-pane-header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid var(--border); }
    #season-label { font-size:11px; letter-spacing:2px; color:var(--hi); }
    .season-btn { font-family:inherit; font-size:10px; color:var(--lo); background:none; border:1px solid var(--border); padding:3px 8px; cursor:pointer; }
    .season-btn:hover:not(:disabled) { color:var(--hi); border-color:var(--mid); }
    .season-btn:disabled { opacity:0.25; cursor:default; }

    #season-tech { display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
    .tech-row { display:flex; align-items:center; gap:10px; font-size:9px; letter-spacing:1px; flex-wrap:wrap; }
    .tech-key { color:var(--lo); width:56px; flex-shrink:0; }
    .tech-val { color:var(--hi); min-width:80px; }
    .tech-pips { display:flex; gap:10px; }
    .pip-group { display:flex; align-items:center; gap:2px; }
    .pip-group .pip { width:7px; height:7px; border-radius:1px; border:1px solid currentColor; }
    .pip-group .pip.on { background:currentColor; }
    .pip-label { font-size:8px; letter-spacing:0.5px; margin-left:3px; opacity:0.65; }
    .pip-power, .pip-burn, .pip-grip, .pip-wear, .pip-tank { color:var(--accent); }

    .section-label { font-size:8px; letter-spacing:2px; color:var(--lo); text-transform:uppercase; margin-bottom:10px; }
    #driver-list { display:flex; gap:12px; flex-wrap:wrap; }

    .driver-chip { display:flex; align-items:center; gap:8px; background:var(--bg-deep); border:1px solid var(--border); padding:6px 12px; text-decoration:none; color:inherit; }
    .driver-chip:hover { border-color:var(--mid); }
    .driver-chip-portrait { width:32px; height:32px; flex-shrink:0; border:1px solid var(--border); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:bold; }
    .driver-chip-portrait img { width:32px; height:32px; object-fit:cover; display:block; }
    .driver-chip-num { width:32px; height:32px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold; color:var(--hi); letter-spacing:0; }
    .driver-chip-name { font-size:11px; color:var(--hi); }
    .driver-chip-nat { font-size:9px; letter-spacing:1px; color:var(--lo); }
    #team-name { font-size:18px; letter-spacing:2px; color:var(--hi); margin-bottom:4px; font-weight:bold; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .flag-strip { width:48px; height:24px; border-radius:2px; object-fit:cover; display:block; flex-shrink:0; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.2); }

    #season-history { border:1px solid var(--border); }
    .history-header { padding:6px 12px; font-size:9px; letter-spacing:2px; color:var(--lo); border-bottom:1px solid var(--border); background:var(--bg-deep); }
    .history-table { width:100%; border-collapse:collapse; }
    .history-table th { font-size:9px; letter-spacing:1px; color:var(--lo); text-align:left; padding:5px 12px; border-bottom:1px solid var(--border); }
    .history-table td { padding:6px 12px; font-size:11px; color:var(--mid); border-bottom:1px solid var(--dim); }
    .history-table tr:last-child td { border-bottom:none; }
    .history-table td.h-year   { color:var(--lo); width:52px; }
    .history-table td.h-pos    { color:var(--hi); width:36px; }
    .history-table td.h-pts    { color:var(--hi); text-align:right; }
    .history-table td.h-wins   { color:var(--lo); text-align:right; }
    .champ-marker { color:var(--accent); font-size:10px; margin-left:4px; }

    @media (max-width:520px) {
      #career-stats { gap:16px; }
    }
  </style>
</head>
<body>

  <div id="sticky-header">
    <div id="topbar">
      <span class="b-flat">Simple <em>Motor Racing</em></span>
      <nav class="topbar-nav">
        <a href="index.html" class="topbar-nav-link">HOME</a>
        <a href="calendar.html" class="topbar-nav-link">CALENDAR</a>
        <a href="drivers.html" class="topbar-nav-link">DRIVERS</a>
        <a href="team.html" class="topbar-nav-link current">TEAMS</a>
        <a href="standings.html" class="topbar-nav-link">STANDINGS</a>
      </nav>
    </div>
    <div id="info-bar">Constructor Profile</div>
    <div id="team-nav" style="display:none">
      <button class="nav-btn" id="btn-prev">◀ PREV</button>
      <span id="team-counter"></span>
      <button class="nav-btn" id="btn-next">NEXT ▶</button>
    </div>
  </div>

  <div id="loading-state">COMPUTING HISTORY…</div>

  <div id="page" style="display:none">
    <div id="as-of-label"></div>
    <div id="profile-card">
      <div id="team-header">
        <div id="livery-bar"></div>
        <div>
          <div id="team-name">—</div>
          <div id="team-meta">—</div>
        </div>
      </div>
      <div id="career-stats">
        <div class="stat-block"><div class="stat-value" id="s-seasons">—</div><div class="stat-label">Seasons</div></div>
        <div class="stat-block"><div class="stat-value" id="s-wins">—</div><div class="stat-label">Wins</div></div>
        <div class="stat-block"><div class="stat-value" id="s-pts">—</div><div class="stat-label">Points</div></div>
        <div class="stat-block"><div class="stat-value" id="s-titles">—</div><div class="stat-label">Titles</div></div>
      </div>
      <div id="season-pane-header">
        <button class="season-btn" id="btn-season-prev">◀</button>
        <span id="season-label">—</span>
        <button class="season-btn" id="btn-season-next">▶</button>
      </div>
      <div id="car-wrap"><div id="car-sprite"></div><div id="team-logo"></div></div>
      <div id="season-pane">
        <div id="season-tech"></div>
        <div class="section-label">Drivers</div>
        <div id="driver-list"></div>
      </div>
    </div>

    <div id="season-history">
      <div class="history-header">CONSTRUCTORS' CHAMPIONSHIP HISTORY</div>
      <table class="history-table">
        <thead>
          <tr>
            <th class="h-year">YEAR</th>
            <th class="h-pos">POS</th>
            <th>DRIVERS</th>
            <th class="h-pts">PTS</th>
            <th class="h-wins">W</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { TEAMS, ENGINES, TYRES }       from './data.js';
    import { DRIVER_POOL }                  from './drivers.js';
    import {
      getActiveRoster, getDisplayYear, getChassisId,
      getTeamEngine, getTeamTyre, getSeasonSnapshot, getCarNumbers,
    }                                       from './worldstate.js';
    import {
      getCurrentEvent, getWorldSeed, getConstructorHistory, loadSeasonSummary,
      ensurePastResultsCached, getStandings, getStandingsThroughRound,
      getLastCompletedRace, formatAsOfLabel,
    }                                       from './championship.js';
    import { initRace, cars }               from './state.js';
    import {
      runRace, initStrategies, initWeather, setCurrentCircuit, runQualifyingSession,
    }                                       from './simulation.js';

    const NAT_CODE = {
      'american':'us',   'argentinian':'ar', 'australian':'au', 'austrian':'at',
      'belgian':'be',    'brazilian':'br',   'british':'gb',    'canadian':'ca',
      'chinese':'cn',    'colombian':'co',   'czech':'cz',      'danish':'dk',
      'dutch':'nl',      'egyptian':'eg',    'finnish':'fi',    'french':'fr',
      'german':'de',     'ghanaian':'gh',    'greek':'gr',      'hungarian':'hu',
      'indian':'in',     'irish':'ie',       'italian':'it',    'japanese':'jp',
      'mexican':'mx',    'moroccan':'ma',    'new zealander':'nz','nigerian':'ng',
      'norwegian':'no',  'polish':'pl',      'portuguese':'pt', 'senegalese':'sn',
      'south african':'za','spanish':'es',   'swedish':'se',    'swiss':'ch',
    };

    const params        = new URLSearchParams(location.search);
    const teamIdParam   = params.get('id');
    const worldSeed     = getWorldSeed();
    const currentEvent  = getCurrentEvent();
    const currentSeason = currentEvent.season;

    const simFns = {
      initRace, cars, runRace, initStrategies, initWeather,
      setCurrentCircuit, runQualifyingSession, getSeasonSnapshot,
    };

    const SORTED_TEAMS = [...TEAMS].sort((a, b) => a.baseNumbers[0] - b.baseNumbers[0]);

    let teamIdx = 0;
    if (teamIdParam) {
      const found = SORTED_TEAMS.findIndex(t => t.id === teamIdParam);
      if (found >= 0) teamIdx = found;
    }

    let viewedSeason = parseInt(params.get('season') || currentSeason, 10);
    viewedSeason = Math.max(1, Math.min(viewedSeason, currentSeason));

    // Set after ensurePastResultsCached completes (spoiler-free cutoff)
    let lastCompleted            = null;
    let currentSeasonCtorStandings = null;

    function updateCarImage(team, season) {
      const chassisEra = Math.floor((season - 1) / 5) + 1;
      const eraYear    = 1930 + (chassisEra - 1) * 5;
      const imageId    = team.carImageId || team.id.toLowerCase();
      const wrap       = document.getElementById('car-sprite');
      wrap.innerHTML   = '';

      const img = document.createElement('img');
      img.className = 'car-img';
      img.alt = '';
      img.onerror = () => {
        wrap.removeChild(img);
        const ph = document.createElement('div');
        ph.className   = 'car-placeholder';
        ph.textContent = `${team.shortName.toUpperCase()} · ${eraYear}`;
        ph.style.color = team.colour;
        wrap.appendChild(ph);
      };
      img.src = `car_sprites_${eraYear}_${imageId}.png`;
      wrap.appendChild(img);
    }

    function updateTeamLogo(team) {
      const imageId  = team.carImageId || team.id.toLowerCase();
      const wrap     = document.getElementById('team-logo');
      wrap.innerHTML = '';

      const img = document.createElement('img');
      img.className = 'logo-img';
      img.alt = '';
      img.onerror = () => {
        wrap.removeChild(img);
        const ph = document.createElement('div');
        ph.className   = 'logo-placeholder';
        ph.textContent = team.shortName.toUpperCase();
        ph.style.color = team.colour;
        wrap.appendChild(ph);
      };
      img.src = `logos/${imageId}.png`;
      wrap.appendChild(img);
    }

    function makePortraitEl(poolDriver, teamColour) {
      const wrap = document.createElement('div');
      wrap.className = 'driver-chip-portrait';
      const pIdx = poolDriver.portraitIndex;
      if (pIdx != null && pIdx < 32) {
        const COLS = 4, PX = 32;
        const sheet = Math.floor(pIdx / 16) + 1;
        const pos   = pIdx % 16;
        const col   = pos % COLS;
        const row   = Math.floor(pos / COLS);
        wrap.style.cssText = `background-image:url('driver_sprites_16x16_${sheet}.png');background-size:${PX*COLS}px ${PX*COLS}px;background-position:${-(col*PX)}px ${-(row*PX)}px;background-color:${teamColour}22;`;
      } else {
        wrap.style.background = `${teamColour}22`;
        wrap.style.color      = teamColour;
        wrap.textContent = (poolDriver.firstName[0] + poolDriver.lastName[0]).toUpperCase();
      }
      return wrap;
    }

    function renderSeasonPane(team, season) {
      const year      = getDisplayYear(season);
      const engineId  = getTeamEngine(team.id, season, worldSeed);
      const tyreId    = getTeamTyre(team.id, season, worldSeed);
      const chassis   = getChassisId(team.id, season);
      const engineName = (ENGINES[engineId]?.name ?? engineId).toUpperCase();
      const tyreName   = (TYRES[tyreId]?.name   ?? tyreId).toUpperCase();

      const snapshot  = getSeasonSnapshot(season, worldSeed);
      const eng       = snapshot.engines[engineId] ?? ENGINES[engineId];
      const tyr       = snapshot.tyres[tyreId]     ?? TYRES[tyreId];
      const teamSnap  = snapshot.teams.find(t => t.id === team.id);

      updateCarImage(team, season);
      updateTeamLogo(team);
      document.getElementById('season-label').textContent = `${year}`;

      document.getElementById('season-tech').innerHTML = `
        <div class="tech-row">
          <span class="tech-key">CHASSIS</span>
          <span class="tech-val">${chassis}</span>
          <div class="tech-pips">
            ${pips(bucket(teamSnap?.fuelCapacity ?? 110, [103, 121]), 'pip-tank', 'FUEL TANK CAPACITY')}
          </div>
        </div>
        <div class="tech-row">
          <span class="tech-key">ENGINE</span>
          <span class="tech-val">${engineName}</span>
          <div class="tech-pips">
            ${pips(bucket(eng.power,        [68, 82]),      'pip-power', 'POWER')}
            ${pips(bucket(eng.fuelBurnRate, [1.03, 1.12]),  'pip-burn',  'CONSUMPTION')}
          </div>
        </div>
        <div class="tech-row">
          <span class="tech-key">TYRES</span>
          <span class="tech-val">${tyreName}</span>
          <div class="tech-pips">
            ${pips(bucket(tyr.maxGrip,  [78, 86]),          'pip-grip', 'GRIP')}
            ${pips(bucket(tyr.wearRate, [0.0108, 0.0127]),  'pip-wear', 'WEAR')}
          </div>
        </div>
      `;

      const seasonRoster = getActiveRoster(season, worldSeed).filter(e => e.teamId === team.id);
      const carNumbers   = getCarNumbers(season, worldSeed);
      const driverList   = document.getElementById('driver-list');
      driverList.innerHTML = '';
      seasonRoster.forEach(entry => {
        const pd = DRIVER_POOL.find(d => d.id === entry.driverId);
        if (!pd) return;
        const nat  = pd.nationality.charAt(0).toUpperCase() + pd.nationality.slice(1);
        const num  = carNumbers.get(entry.driverId) ?? '';
        const chip = document.createElement('a');
        chip.href      = `driver.html?id=${entry.driverId}&season=${season}`;
        chip.className = 'driver-chip';
        chip.appendChild(makePortraitEl(pd, team.colour));
        const numEl = document.createElement('div');
        numEl.className   = 'driver-chip-num';
        numEl.style.color = team.colour;
        numEl.textContent = num;
        chip.appendChild(numEl);
        const info = document.createElement('div');
        info.innerHTML = `<div class="driver-chip-name">${pd.firstName} ${pd.lastName}</div><div class="driver-chip-nat">${nat}</div>`;
        chip.appendChild(info);
        driverList.appendChild(chip);
      });

      document.getElementById('btn-season-prev').disabled = season <= 1;
      document.getElementById('btn-season-next').disabled = season >= currentSeason;
    }

    function renderTeam(idx) {
      const team        = SORTED_TEAMS[idx];
      const ctorHistory = getConstructorHistory(team.id); // completed seasons only
      const csEntry     = currentSeasonCtorStandings?.constructors.find(c => c.id === team.id);

      const totals = ctorHistory.reduce((acc, s) => ({
        wins:   acc.wins   + s.wins,
        pts:    acc.pts    + s.points,
        titles: acc.titles + (s.champion ? 1 : 0),
      }), { wins:0, pts:0, titles:0 });
      if (csEntry) { totals.wins += csEntry.wins; totals.pts += csEntry.points; }
      const seasonCount = ctorHistory.length + (csEntry ? 1 : 0);

      document.getElementById('info-bar').textContent        = `Constructor Profile · ${team.name}`;
      document.getElementById('livery-bar').style.background = team.colour;

      const nameEl = document.getElementById('team-name');
      nameEl.innerHTML = '';
      const nameSpan = document.createElement('span');
      nameSpan.textContent = team.name.toUpperCase();
      nameEl.appendChild(nameSpan);
      const flagCode = NAT_CODE[team.nationality.toLowerCase()];
      if (flagCode) {
        const fi = document.createElement('img');
        fi.className = 'flag-strip';
        fi.alt = '';
        fi.src = `https://flagcdn.com/w160/${flagCode}.png`;
        nameEl.appendChild(fi);
      }

      document.getElementById('team-meta').textContent       = `${team.nationality.toUpperCase()} · EST. ${getDisplayYear(1)}`;
      document.getElementById('s-seasons').textContent       = seasonCount || '—';
      document.getElementById('s-wins').textContent          = totals.wins;
      document.getElementById('s-pts').textContent           = totals.pts;
      document.getElementById('s-titles').textContent        = totals.titles;

      document.getElementById('as-of-label').textContent = lastCompleted ? formatAsOfLabel(lastCompleted) : '';

      renderSeasonPane(team, viewedSeason);

      // History table — most recent first
      const tbody = document.getElementById('history-body');
      tbody.innerHTML = '';

      // Current partial season row (top, most recent)
      if (csEntry) {
        const csYear = getDisplayYear(currentSeason);
        const csPos  = (currentSeasonCtorStandings.constructors.findIndex(c => c.id === team.id) + 1) || '?';
        const activeRosterNow = getActiveRoster(currentSeason, worldSeed).filter(e => e.teamId === team.id);
        const csDriverNames   = activeRosterNow.map(e => {
          const pd = DRIVER_POOL.find(d => d.id === e.driverId);
          return pd ? pd.lastName : '—';
        }).join(' / ');
        const csTr = document.createElement('tr');
        csTr.innerHTML = `
          <td class="h-year">${csYear}</td>
          <td class="h-pos">${csPos}</td>
          <td>${csDriverNames}</td>
          <td class="h-pts">${csEntry.points}</td>
          <td class="h-wins">${csEntry.wins}</td>
        `;
        tbody.appendChild(csTr);
      }

      [...ctorHistory].reverse().forEach(hs => {
        const year      = getDisplayYear(hs.season);
        const standings = getStandings(hs.season);
        const posIdx    = standings.constructors.findIndex(c => c.id === team.id);
        const pos       = posIdx >= 0 ? posIdx + 1 : '?';

        const summary = loadSeasonSummary(hs.season);
        const driverNames = summary
          ? Object.values(summary.drivers)
              .filter(d => d.teamId === team.id)
              .map(d => {
                const parts = d.driverName.split(' ');
                return parts[parts.length - 1];
              })
              .join(' / ')
          : '—';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="h-year">${year}</td>
          <td class="h-pos">${pos}${hs.champion ? '<span class="champ-marker">★</span>' : ''}</td>
          <td>${driverNames}</td>
          <td class="h-pts">${hs.points}</td>
          <td class="h-wins">${hs.wins}</td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('team-counter').textContent = `${idx + 1} / ${SORTED_TEAMS.length}`;
      document.getElementById('btn-prev').disabled = idx === 0;
      document.getElementById('btn-next').disabled = idx === SORTED_TEAMS.length - 1;

      document.title = `${team.name} — Simple Motor Racing`;
      window.history.replaceState(null, '', `team.html?id=${team.id}&season=${viewedSeason}`);
    }

    function bucket(val, [lo, hi]) {
      return val <= lo ? 1 : val <= hi ? 2 : 3;
    }

    function pips(level, cls, label) {
      const dots = [1,2,3].map(i =>
        `<span class="pip ${i <= level ? 'on' : 'off'}"></span>`
      ).join('');
      return `<span class="pip-group ${cls}">${dots}<span class="pip-label">${label}</span></span>`;
    }

    document.getElementById('btn-prev').addEventListener('click', () => { teamIdx--; renderTeam(teamIdx); });
    document.getElementById('btn-next').addEventListener('click', () => { teamIdx++; renderTeam(teamIdx); });

    document.getElementById('btn-season-prev').addEventListener('click', () => {
      viewedSeason = Math.max(1, viewedSeason - 1);
      renderSeasonPane(SORTED_TEAMS[teamIdx], viewedSeason);
      window.history.replaceState(null, '', `team.html?id=${SORTED_TEAMS[teamIdx].id}&season=${viewedSeason}`);
    });
    document.getElementById('btn-season-next').addEventListener('click', () => {
      viewedSeason = Math.min(currentSeason, viewedSeason + 1);
      renderSeasonPane(SORTED_TEAMS[teamIdx], viewedSeason);
      window.history.replaceState(null, '', `team.html?id=${SORTED_TEAMS[teamIdx].id}&season=${viewedSeason}`);
    });

    (async () => {
      const loadingEl = document.getElementById('loading-state');
      for (let s = 1; s <= currentSeason; s++) {
        loadingEl.textContent = `COMPUTING SEASON ${getDisplayYear(s)}…`;
        await ensurePastResultsCached(s, simFns);
      }
      lastCompleted = getLastCompletedRace();
      if (lastCompleted && lastCompleted.season === currentSeason) {
        currentSeasonCtorStandings = getStandingsThroughRound(currentSeason, lastCompleted.round);
      }
      loadingEl.style.display = 'none';
      document.getElementById('team-nav').style.display = '';
      document.getElementById('page').style.display = '';
      renderTeam(teamIdx);
    })();
  </script>

</body>
</html>
